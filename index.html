<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JLT Investment Agent</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --card-soft: #fbfcfd;
      --text: #16202a;
      --muted: #64717f;
      --border: #dce3ea;
      --border-strong: #c9d3dd;

      --blue: #1f5fbf;
      --green: #0b7a3b;
      --amber: #b26a00;
      --red: #a12626;

      --soft-blue: #eef4ff;
      --soft-green: #eefaf2;
      --soft-amber: #fff6e5;
      --soft-red: #fff0f0;

      --shadow: 0 8px 22px rgba(0, 0, 0, 0.055);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 22px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 15px;
    }

    code {
      background: #eef1f4;
      padding: 2px 5px;
      border-radius: 6px;
    }

    button {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--blue);
      font-weight: 700;
      border-radius: 11px;
      padding: 9px 12px;
      cursor: pointer;
    }

    button:hover { background: var(--soft-blue); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }

    .decision-card {
      border-left: 8px solid var(--red);
    }

    .layout-two {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .grid-four {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      min-height: 78px;
      overflow: hidden;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric-value {
      margin-top: 5px;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .metric-small {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .decision-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .decision-subtitle {
      font-size: 16px;
      color: var(--muted);
      max-width: 980px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .small-text {
      color: var(--muted);
      font-size: 12px;
    }

    .banner {
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: var(--card-soft);
    }

    .banner.good {
      background: var(--soft-green);
      border-color: #b7e5c7;
    }

    .banner.warn {
      background: var(--soft-amber);
      border-color: #ffd38a;
    }

    .banner.bad {
      background: var(--soft-red);
      border-color: #ffb4b4;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--border);
      background: #f8f9fa;
      white-space: nowrap;
    }

    .pill.good {
      color: var(--green);
      background: var(--soft-green);
      border-color: #b7e5c7;
    }

    .pill.warn {
      color: var(--amber);
      background: var(--soft-amber);
      border-color: #ffd38a;
    }

    .pill.bad {
      color: var(--red);
      background: var(--soft-red);
      border-color: #ffb4b4;
    }

    .pill.blue {
      color: var(--blue);
      background: var(--soft-blue);
      border-color: #bdd3ff;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .toolbar input,
    .toolbar select {
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      min-height: 38px;
      font-size: 14px;
    }

    .toolbar input {
      min-width: 250px;
      flex: 1;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f1f4f7;
      color: #2d3748;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.035em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td { border-bottom: none; }

    .num {
      text-align: right;
      white-space: nowrap;
    }

    details {
      cursor: pointer;
      margin-top: 8px;
    }

    summary {
      color: var(--blue);
      font-weight: 800;
      font-size: 13px;
    }

    .metric details summary {
      font-size: 12px;
    }

    .details-box {
      margin-top: 8px;
      color: var(--muted);
      max-width: 1080px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }

    .compact-detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .candidate-title {
      font-weight: 800;
      color: var(--text);
    }

    .loading {
      padding: 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cfd6df;
      border-top: 2px solid var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 8px;
      vertical-align: -2px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1180px) {
      .layout-two {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-two,
      .grid-four {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .container { padding: 14px; }

      .grid,
      .grid-two,
      .grid-four {
        grid-template-columns: 1fr;
      }

      h1 { font-size: 24px; }
      .decision-title { font-size: 24px; }
      .toolbar input { min-width: 100%; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div>
        <h1>JLT Investment Agent</h1>
        <div class="subtitle">Macro-aware, finance-driven JLT ready-apartment screening</div>
      </div>
      <button onclick="window.location.reload()">Refresh</button>
    </header>

    <div id="app" class="loading">
      <span class="spinner"></span>Loading latest run...
    </div>
  </div>

  <script>
    const SUPABASE_REST_URL = "https://cndyxfprqpfkzypxhrxl.supabase.co/rest/v1";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VOIytNYEBG7FyZzQqqW66w_nJWK37TC";

    const VIEW_WATCHLIST = "dashboard_decision_watchlist_v";
    const TABLE_AGENT_CONTEXT = "agent_run_context";
    const TABLE_BANK_CONTEXT = "bank_benchmark_context";

    const PURCHASE_COST_PERCENT = 6.6;

    const AED = new Intl.NumberFormat("en-AE", { maximumFractionDigits: 0 });
    const NUM = new Intl.NumberFormat("en-AE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const state = {
      rows: [],
      contextRows: [],
      bankRows: [],
      filters: { search: "", readiness: "ALL", realism: "ALL" },
      dealTest: { selectedIndex: 0, ownerAsk: "", targetYield: "" }
    };

    function safe(v, fallback = "") {
      return v === null || v === undefined || v === "" ? fallback : v;
    }

    function num(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function money(v) {
      const n = num(v);
      return n === 0 ? "0" : AED.format(n);
    }

    function pct(v) {
      return NUM.format(num(v));
    }

    function dateTime(v) {
      if (!v) return "N/A";
      try { return new Date(v).toLocaleString(); } catch { return v; }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeTextBlock(text) {
      const s = String(text || "").trim();
      return s || "No text available.";
    }

    function rowName(row) {
      return `${safe(row.tower)} ${safe(row.unit_type)}`.trim();
    }

    function pill(text, tone = null) {
      const t = String(text || "").toUpperCase();
      let cls = tone;

      if (!cls) {
        if (t.includes("BUY") || t.includes("REALISTIC") || t.includes("READY")) cls = "good";
        else if (t.includes("POSSIBLE") || t.includes("DIFFICULT") || t.includes("INTERIM") || t.includes("WATCH")) cls = "warn";
        else if (t.includes("UNLIKELY") || t.includes("NEEDS") || t.includes("DATA") || t.includes("PASS")) cls = "bad";
        else if (t.includes("MONITOR") || t.includes("DEAL")) cls = "blue";
        else cls = "";
      }

      return `<span class="pill ${cls}">${escapeHtml(safe(text, "N/A"))}</span>`;
    }

    function readinessLabel(status) {
      const s = String(status || "").toUpperCase();
      if (s === "DECISION_READY") return "Decision-ready";
      if (s === "INTERIM_SCREENED") return "Interim-screened";
      if (s === "NEEDS_EVIDENCE") return "Needs evidence";
      if (s === "BUDGET_MONITOR") return "Budget monitor";
      if (s === "DEAL_TEST") return "Deal test";
      return "Review";
    }

    function sortByNetYield(rows) {
      return [...rows].sort((a, b) => num(b.net_yield_percent) - num(a.net_yield_percent));
    }

    function classifyRows(rows) {
      return {
        decisionReady: rows.filter(r => r.readiness_status === "DECISION_READY"),
        interim: rows.filter(r => r.readiness_status === "INTERIM_SCREENED"),
        needsEvidence: rows.filter(r => r.readiness_status === "NEEDS_EVIDENCE"),
        budgetMonitor: rows.filter(r => r.readiness_status === "BUDGET_MONITOR"),
        dealTest: rows.filter(r => r.readiness_status === "DEAL_TEST")
      };
    }

    function getEvidenceRows(rows) {
      return rows.filter(r => ["DECISION_READY", "INTERIM_SCREENED"].includes(r.readiness_status));
    }

    function getBestWatch(rows) {
      return sortByNetYield(getEvidenceRows(rows))[0] || null;
    }

    function getLatestContext() {
      return state.contextRows[0] || {};
    }

    function getLatestBank() {
      return state.bankRows[0] || state.rows.find(r => r.bank_yield_percent !== null && r.bank_yield_percent !== undefined) || {};
    }

    function getNegotiationTone(realism) {
      const s = String(realism || "").toUpperCase();
      if (s === "REALISTIC") return "good";
      if (s === "POSSIBLE" || s === "DIFFICULT") return "warn";
      if (s === "UNLIKELY") return "bad";
      return "blue";
    }

    function estimatedPurchaseCosts(price) {
      return num(price) * PURCHASE_COST_PERCENT / 100;
    }

    function allInCost(price) {
      return num(price) + estimatedPurchaseCosts(price);
    }

    function netRentFromRow(row) {
      return num(row.asking_price_aed) * num(row.net_yield_percent) / 100;
    }

    function scoreLabel(value, type) {
      const v = num(value, 0);

      if (type === "FS") {
        if (v > 0) return "supportive / stable";
        if (v < 0) return "soft / risk-on-hold";
        return "mixed / neutral";
      }

      if (type === "LEI") {
        if (v > 0) return "improving forward signal";
        if (v < 0) return "weakening forward signal";
        return "mixed / neutral forward signal";
      }

      return "mixed";
    }

    function fsScoringLogic(fs) {
      return `Financial Stability score is a conservative macro risk score.

Scoring rule:
+1 = clear stability / supportive liquidity / no major stress signals.
0 = mixed or incomplete evidence.
-1 = stress or caution signals are present.

Current FS = ${fs} (${scoreLabel(fs, "FS")}).

Why current score is negative:
- Macro branch returned soft / cautionary market context.
- Current evidence does not support relaxing entry pricing.
- Regional/geopolitical and financial-stability uncertainty are treated conservatively.

Effect on decision:
A negative FS does not reject property by itself. It increases the required entry discipline.`;
    }

    function leiScoringLogic(lei) {
      return `Proxy LEI is the forward-looking economic momentum score.

Scoring rule:
+1 = improving momentum / supportive forward indicators.
0 = mixed or neutral.
-1 = slowing momentum, weak outlook, disruption, or uncertainty.

Current LEI = ${lei} (${scoreLabel(lei, "LEI")}).

Why current score is negative:
- Macro branch flagged weaker forward momentum / soft PMI-style signals.
- Slower growth or disruption language reduces confidence in near-term market momentum.
- Therefore the agent should not accept a thin property return spread.

Effect on decision:
A negative LEI pushes the hurdle from 6.50% to 6.75%.`;
    }

    function hurdleLogic(best, fs, lei) {
      return `Base strong-buy hurdle = 6.50% net yield.

Macro adjustment rule:
If Financial Stability < 0 OR Proxy LEI < 0, use stricter hurdle = 6.75%.

Current inputs:
Financial Stability = ${fs}.
Proxy LEI = ${lei}.

Applied hurdle = ${best ? pct(best.risk_adjusted_target_yield_percent) : "N/A"}%.

Reason:
When macro/forward indicators are soft, the deal must be cheaper to compensate for uncertainty, illiquidity and possible weaker resale/rental conditions.`;
    }

    function negotiationExplanation(row) {
      const p = num(row.risk_adjusted_required_cut_percent);
      const realism = String(row.negotiation_realism || "NOT_APPLICABLE").toUpperCase();

      const base = `Current evidence price: AED ${money(row.asking_price_aed)}.
Risk-adjusted target price: AED ${money(row.risk_adjusted_target_price_aed)}.
Required cut: AED ${money(row.risk_adjusted_required_cut_aed)} / ${pct(p)}%.`;

      if (realism === "REALISTIC") return `${base}

This is within a normal negotiation band. Active negotiation can be justified if evidence is sound.`;
      if (realism === "POSSIBLE") return `${base}

This requires seller motivation or negotiation leverage. Track, but do not chase.`;
      if (realism === "DIFFICULT") return `${base}

This is above normal negotiation range. It needs a motivated seller, stale listing, cash-buyer advantage, or unit-specific weakness.`;
      if (realism === "UNLIKELY") return `${base}

This discount is likely unrealistic unless distress, poor unit condition, urgent seller, or abnormal listing appears.`;

      return "Negotiation realism is not applicable for this row.";
    }

    function compactSourceNote(row) {
      const confidence = String(row.input_data_confidence || "");

      if (row.readiness_status === "INTERIM_SCREENED") {
        return `Status: Interim-screened
Basis: Property Finder DLD-derived sale/rent + user-entered 2026 DLD service charge.
Why not final: Property Finder references DLD-derived transactions, but it is still a secondary interface, not a direct DLD/Ejari export.
Known limitations: filtering, aggregation, partial-period rent contracts, tower/unit mapping, and freshness checks.
Confidence: ${confidence}
Next action: ${safe(row.next_data_action, "Validate direct source before offer.")}`;
      }

      if (row.readiness_status === "NEEDS_EVIDENCE") {
        return `Status: Needs evidence
Issue: ${safe(row.evidence_gap_reason, "Sale/rent evidence incomplete.")}
Why it matters: ${whyItMatters(row)}
Next action: ${safe(row.next_data_action, "Add evidence before valuation.")}`;
      }

      if (row.readiness_status === "BUDGET_MONITOR") {
        return `Status: Budget monitor
Issue: ${safe(row.evidence_gap_reason, "Likely above budget.")}
Next action: ${safe(row.next_data_action, "Monitor only for distressed below-budget opportunity.")}`;
      }

      return `Status: ${readinessLabel(row.readiness_status)}
Next action: ${safe(row.next_data_action, "Review.")}`;
    }

    function fullEvidenceDetails(row) {
      return `Price source: ${safe(row.price_source_note, "N/A")}

Rent source: ${safe(row.rent_source_note, "N/A")}

Service-charge source: ${safe(row.service_charge_source_note, "N/A")}

Technical verdict: ${safe(row.final_decision, "N/A")}

Decision reason: ${safe(row.decision_reason, "N/A")}`;
    }

    function whyItMatters(row) {
      const reason = String(row.evidence_gap_reason || "").toLowerCase();
      if (row.readiness_status === "INTERIM_SCREENED") return "Good for screening, but final offer should still be validated against direct/primary evidence.";
      if (reason.includes("rent")) return "Without rent evidence, net yield and IRR cannot be trusted.";
      if (reason.includes("sale")) return "Without sale evidence, fair entry price and required discount cannot be trusted.";
      if (row.readiness_status === "BUDGET_MONITOR") return "Normal market level appears above the AED 1.6m capital limit.";
      return "Weak evidence can distort yield, IRR, fair price and negotiation target.";
    }

    function filteredRows(rows) {
      const search = state.filters.search.trim().toLowerCase();
      const readiness = state.filters.readiness;
      const realism = state.filters.realism;

      return rows.filter(row => {
        const haystack = [row.tower, row.unit_type, row.readiness_status, row.negotiation_realism, row.daily_action_category].join(" ").toLowerCase();
        return (!search || haystack.includes(search))
          && (readiness === "ALL" || row.readiness_status === readiness)
          && (realism === "ALL" || row.negotiation_realism === realism);
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs = 15000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeout);
        return response;
      } catch (error) {
        clearTimeout(timeout);
        throw error;
      }
    }

    async function restGet(path, query = "select=*") {
      const url = `${SUPABASE_REST_URL}/${path}?${query}`;
      const response = await fetchWithTimeout(url, {
        method: "GET",
        headers: {
          "apikey": SUPABASE_PUBLISHABLE_KEY,
          "Authorization": `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
          "Accept": "application/json"
        }
      });

      const text = await response.text();
      if (!response.ok) throw new Error(`REST ${path} failed: ${response.status} ${text}`);

      try { return JSON.parse(text); }
      catch { throw new Error(`REST ${path} returned non-JSON response: ${text}`); }
    }

    function renderKpiMetric(label, value, small, explanation) {
      return `
        <div class="metric">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div class="metric-value">${value}</div>
          <div class="metric-small">${escapeHtml(small)}</div>
          <details>
            <summary>Why?</summary>
            <div class="details-box">${escapeHtml(explanation)}</div>
          </details>
        </div>
      `;
    }

    function renderExecutiveDecision() {
      const rows = state.rows;
      const groups = classifyRows(rows);
      const best = getBestWatch(rows);
      const context = getLatestContext();
      const bank = getLatestBank();

      const latestRun = rows[0]?.run_id || "N/A";
      const latestTime = rows[0]?.created_at || null;

      const bankRate = bank.benchmark_rate_percent || best?.bank_yield_percent || 3.5;
      const bankQuality = bank.source_quality || best?.bank_source_quality || "HIGH";

      const fs = safe(context.financial_stability_score ?? best?.financial_stability_score, "N/A");
      const lei = safe(context.proxy_lei_score ?? best?.proxy_lei_score, "N/A");
      const macroConfidence = safe(context.confidence_level ?? best?.macro_confidence, "MEDIUM");

      const netRent = best ? netRentFromRow(best) : 0;
      const allIn = best ? allInCost(best.asking_price_aed) : 0;

      return `
        <section class="card decision-card">
          <div class="decision-title">Do not buy now</div>
          <div class="decision-subtitle">
            ${best
              ? `Best watch item is <strong>${escapeHtml(rowName(best))}</strong>, but it still requires AED ${money(best.risk_adjusted_required_cut_aed)} / ${pct(best.risk_adjusted_required_cut_percent)}% lower entry price.`
              : `No evidence-based candidate is currently available.`
            }
          </div>

          <div class="grid">
            ${renderKpiMetric(
              "Best Watch Item",
              best ? escapeHtml(rowName(best)) : "None",
              best ? readinessLabel(best.readiness_status) : "N/A",
              best
                ? `Selected because it has the highest current net yield among decision-ready / interim-screened candidates.

Current ranking yield: ${pct(best.net_yield_percent)}%.
Current price: AED ${money(best.asking_price_aed)}.
Estimated net rent: AED ${money(netRent)} per year.

It is a watch item, not a buy recommendation.`
                : "No decision-ready or interim-screened row is available."
            )}

            ${renderKpiMetric(
              "Current Net Yield",
              best ? `${pct(best.net_yield_percent)}%` : "N/A",
              "Current economics",
              best
                ? `Formula used in model: net rent ÷ current evidence price.

Estimated net rent: AED ${money(netRent)}.
Current evidence price: AED ${money(best.asking_price_aed)}.
Net yield: ${pct(best.net_yield_percent)}%.

All-in acquisition estimate is higher: AED ${money(allIn)} including about ${pct(PURCHASE_COST_PERCENT)}% purchase costs, so all-in yield would be lower.`
                : "No current yield available."
            )}

            ${renderKpiMetric(
              "Risk-Adjusted Hurdle",
              best ? `${pct(best.risk_adjusted_target_yield_percent)}%` : "N/A",
              "Macro-adjusted trigger",
              best ? hurdleLogic(best, fs, lei) : "No risk-adjusted hurdle available."
            )}

            ${renderKpiMetric(
              "Risk-Adjusted Price",
              `AED ${best ? money(best.risk_adjusted_target_price_aed) : "N/A"}`,
              "Target entry",
              best
                ? `Formula: estimated net rent ÷ risk-adjusted target yield.

Estimated net rent: AED ${money(netRent)}.
Target yield: ${pct(best.risk_adjusted_target_yield_percent)}%.
Target price: AED ${money(best.risk_adjusted_target_price_aed)}.

This is the approximate maximum entry price under current risk conditions.`
                : "No target price available."
            )}

            ${renderKpiMetric(
              "Required Cut",
              `AED ${best ? money(best.risk_adjusted_required_cut_aed) : "N/A"}`,
              best ? `${pct(best.risk_adjusted_required_cut_percent)}% — ${safe(best.negotiation_realism)}` : "N/A",
              best ? negotiationExplanation(best) : "No required cut available."
            )}

            ${renderKpiMetric(
              "Macro / Bank",
              `FS ${escapeHtml(fs)} / LEI ${escapeHtml(lei)}`,
              `Bank ${pct(bankRate)}% / ${escapeHtml(bankQuality)} / ${escapeHtml(macroConfidence)}`,
              `Current macro scoring:
FS = ${fs} (${scoreLabel(fs, "FS")}).
LEI = ${lei} (${scoreLabel(lei, "LEI")}).

FS basis:
${fsScoringLogic(fs)}

LEI basis:
${leiScoringLogic(lei)}

Bank benchmark:
Current bank benchmark = ${pct(bankRate)}%.
Property should offer enough spread above this low-risk AED alternative to compensate for illiquidity, vacancy, service charge, transaction fees and exit risk.`
            )}
          </div>

          <div class="banner warn">
            <strong>Advisor read:</strong>
            Median-market pricing is not cheap enough. Track only, close evidence gaps, and wait for motivated-seller pricing near the risk-adjusted target.
          </div>

          <div class="note">
            Latest run <strong>${escapeHtml(latestRun)}</strong> at ${dateTime(latestTime)}.
            Decision-ready: <strong>${groups.decisionReady.length}</strong>.
            Interim-screened: <strong>${groups.interim.length}</strong>.
            Needs evidence: <strong>${groups.needsEvidence.length}</strong>.
            Budget monitor: <strong>${groups.budgetMonitor.length}</strong>.
            Deal test: <strong>${groups.dealTest.length}</strong>.
          </div>
        </section>
      `;
    }

    function renderMacroPanel() {
      const context = getLatestContext();
      const best = getBestWatch(state.rows);

      const fs = safe(context.financial_stability_score ?? best?.financial_stability_score, "N/A");
      const lei = safe(context.proxy_lei_score ?? best?.proxy_lei_score, "N/A");
      const confidence = safe(context.confidence_level ?? best?.macro_confidence, "MEDIUM");
      const quality = safe(context.data_quality_score ?? best?.macro_data_quality, "MEDIUM");
      const riskYield = best?.risk_adjusted_target_yield_percent || 6.75;
      const negative = num(fs) < 0 || num(lei) < 0;

      return `
        <section class="card">
          <h2>Market / Macro Overlay</h2>
          <div class="note">Macro changes entry discipline. It does not rescue weak property economics.</div>

          <div class="grid-two">
            ${renderKpiMetric(
              "Financial Stability",
              escapeHtml(fs),
              "Score scale: +1 / 0 / -1",
              fsScoringLogic(fs)
            )}

            ${renderKpiMetric(
              "Proxy LEI",
              escapeHtml(lei),
              "Forward signal",
              leiScoringLogic(lei)
            )}

            ${renderKpiMetric(
              "Risk Yield",
              `${pct(riskYield)}%`,
              "Current hurdle",
              best ? hurdleLogic(best, fs, lei) : "Risk yield applies the macro-adjusted hurdle."
            )}

            ${renderKpiMetric(
              "Source Quality",
              escapeHtml(quality),
              `${escapeHtml(confidence)} confidence`,
              `Macro source quality reflects the evidence returned by the live macro branch.

Current quality = ${quality}.
Current confidence = ${confidence}.

This does not directly decide buy/sell. It only controls how strict the entry price should be.`
            )}
          </div>

          <div class="banner ${negative ? "warn" : "good"}">
            <strong>Macro read:</strong>
            ${negative
              ? "Soft/negative. Require wider entry margin and do not chase median prices."
              : "Not negative. Still require property-level yield and evidence support."
            }
          </div>

          <details>
            <summary>View market pulse evidence</summary>
            <div class="details-box">${escapeHtml(normalizeTextBlock(context.market_pulse_preview || context.market_pulse || context.macro_regime))}</div>
          </details>
        </section>
      `;
    }

    function renderBankPanel() {
      const bank = getLatestBank();
      const best = getBestWatch(state.rows);
      const rate = bank.benchmark_rate_percent || best?.bank_yield_percent || 3.5;
      const quality = bank.source_quality || best?.bank_source_quality || "HIGH";

      return `
        <section class="card">
          <h2>Bank Benchmark</h2>
          <div class="note">Low-risk AED cash alternative used to test property IRR spread.</div>

          <div class="grid-two">
            ${renderKpiMetric(
              "Rate Used",
              `${pct(rate)}%`,
              "AED term-deposit benchmark",
              `The model compares property 5Y IRR against an AED bank benchmark.

Current rate used: ${pct(rate)}%.
This helps test whether property risk is compensated versus low-risk cash return.`
            )}

            ${renderKpiMetric(
              "Source Quality",
              escapeHtml(quality),
              escapeHtml(safe(bank.confidence_level, quality)),
              `Current source quality = ${quality}.
Current confidence = ${safe(bank.confidence_level, quality)}.

The rate is from the dedicated bank benchmark branch, not from random property assumptions.`
            )}

            ${renderKpiMetric(
              "Target Spread",
              "3.00%",
              "Property IRR above bank",
              `Target spread = 3.00 percentage points above bank.

Example:
Bank = ${pct(rate)}%.
Preferred property IRR should be about ${pct(num(rate) + 3)}% or higher.

This compensates for illiquidity, vacancy, fees, maintenance, tenant risk and exit risk.`
            )}

            ${renderKpiMetric(
              "Purchase Cost",
              `${pct(PURCHASE_COST_PERCENT)}%`,
              "Estimated acquisition cost",
              `Current dashboard estimate uses ${pct(PURCHASE_COST_PERCENT)}% purchase cost as an all-in capital reminder.

Indicative breakdown:
DLD transfer fee: ~4.0%.
Agency fee: ~2.0% plus VAT, approximately 2.1%.
Trustee/conveyancing/admin/NOC allowance: ~0.5%.

Total screening assumption: ${pct(PURCHASE_COST_PERCENT)}%.`
            )}
          </div>

          <details>
            <summary>View bank source details</summary>
            <div class="details-box">Bank name: ${escapeHtml(safe(bank.bank_name, "HSBC UAE / UAE bank benchmark"))}
Rate used: ${pct(rate)}%
Status: ${escapeHtml(safe(bank.benchmark_rate_status, "N/A"))}
Usage: ${escapeHtml(safe(bank.calculation_usage_status, "N/A"))}
Notes: ${escapeHtml(safe(bank.source_notes || bank.bank_benchmark_source_note, "N/A"))}</div>
          </details>
        </section>
      `;
    }

    function renderWatchlist() {
      const evidenceRows = sortByNetYield(getEvidenceRows(state.rows));

      if (!evidenceRows.length) {
        return `<section class="card"><h2>Price Target Watchlist</h2><div class="banner bad">No evidence-based watchlist rows available.</div></section>`;
      }

      return `
        <section class="card">
          <h2>Price Target Watchlist</h2>
          <div class="note">
            Ranked by net yield. Includes estimated purchase costs and risk-adjusted target price.
          </div>

          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="Search tower or unit..." value="${escapeHtml(state.filters.search)}" />
            <select id="readinessSelect">
              <option value="ALL">All readiness</option>
              <option value="DECISION_READY">Decision-ready</option>
              <option value="INTERIM_SCREENED">Interim-screened</option>
              <option value="NEEDS_EVIDENCE">Needs evidence</option>
              <option value="BUDGET_MONITOR">Budget monitor</option>
            </select>
            <select id="realismSelect">
              <option value="ALL">All negotiation realism</option>
              <option value="REALISTIC">Realistic</option>
              <option value="POSSIBLE">Possible</option>
              <option value="DIFFICULT">Difficult</option>
              <option value="UNLIKELY">Unlikely</option>
            </select>
          </div>

          ${renderWatchlistTable(filteredRows(evidenceRows))}

          <details>
            <summary>All-in cost assumptions</summary>
            <div class="details-box">The dashboard adds an estimated ${pct(PURCHASE_COST_PERCENT)}% purchase-cost allowance to show practical capital required.

Indicative breakdown:
- DLD transfer fee: ~4.0%
- Agency fee: ~2.0% + VAT, approximately 2.1%
- Trustee / conveyancing / admin / NOC allowance: ~0.5%

This is a screening estimate. Actual costs depend on transaction structure, financing, agency arrangement and registration details.</div>
          </details>
        </section>
      `;
    }

    function renderWatchlistTable(rows) {
      if (!rows.length) return `<div class="banner warn">No rows match the selected filters.</div>`;

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Candidate</th>
                <th>Status</th>
                <th class="num">Price</th>
                <th class="num">Est. Buy Costs</th>
                <th class="num">All-in Cost</th>
                <th class="num">Rent</th>
                <th class="num">Net Yield</th>
                <th class="num">Risk Target Price</th>
                <th class="num">Required Cut</th>
                <th>Negotiation</th>
                <th>Evidence</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((r, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="candidate-title">${escapeHtml(safe(r.tower))}</span><br><span class="small-text">${escapeHtml(safe(r.unit_type))}</span></td>
                  <td>${pill(readinessLabel(r.readiness_status))}</td>
                  <td class="num">AED ${money(r.asking_price_aed)}</td>
                  <td class="num">AED ${money(estimatedPurchaseCosts(r.asking_price_aed))}<br><span class="small-text">${pct(PURCHASE_COST_PERCENT)}%</span></td>
                  <td class="num">AED ${money(allInCost(r.asking_price_aed))}</td>
                  <td class="num">AED ${money(r.estimated_annual_rent_aed)}</td>
                  <td class="num">${pct(r.net_yield_percent)}%</td>
                  <td class="num">AED ${money(r.risk_adjusted_target_price_aed)}</td>
                  <td class="num">AED ${money(r.risk_adjusted_required_cut_aed)}<br><span class="small-text">${pct(r.risk_adjusted_required_cut_percent)}%</span></td>
                  <td>${pill(safe(r.negotiation_realism), getNegotiationTone(r.negotiation_realism))}</td>
                  <td>
                    <details>
                      <summary>View</summary>
                      <div class="compact-detail">${escapeHtml(compactSourceNote(r))}</div>
                      <details>
                        <summary>Raw source details</summary>
                        <div class="details-box">${escapeHtml(fullEvidenceDetails(r))}</div>
                      </details>
                    </details>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderEvidenceMap() {
      const nonDealRows = state.rows.filter(r => r.readiness_status !== "DEAL_TEST");

      const order = {
        "DECISION_READY": 1,
        "INTERIM_SCREENED": 2,
        "NEEDS_EVIDENCE": 3,
        "BUDGET_MONITOR": 4
      };

      const sorted = [...nonDealRows].sort((a, b) => {
        const oa = order[a.readiness_status] || 99;
        const ob = order[b.readiness_status] || 99;
        if (oa !== ob) return oa - ob;
        return String(a.tower).localeCompare(String(b.tower));
      });

      return `
        <section class="card">
          <details>
            <summary><h2 style="display:inline;">Evidence Coverage & Data Actions</h2></summary>
            <div class="note">
              QA section. Use it to see what is missing and why final purchase action cannot be made.
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Candidate</th>
                    <th>Readiness</th>
                    <th>Issue / Basis</th>
                    <th>Why It Matters</th>
                    <th>Next Data Action</th>
                  </tr>
                </thead>
                <tbody>
                  ${sorted.map(r => `
                    <tr>
                      <td><span class="candidate-title">${escapeHtml(safe(r.tower))}</span><br><span class="small-text">${escapeHtml(safe(r.unit_type))}</span></td>
                      <td>${pill(readinessLabel(r.readiness_status))}</td>
                      <td>${escapeHtml(safe(r.evidence_gap_reason, "N/A"))}</td>
                      <td>${escapeHtml(whyItMatters(r))}</td>
                      <td>${escapeHtml(safe(r.next_data_action, "N/A"))}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </details>
        </section>
      `;
    }

    function renderDealTestCalculator() {
      const candidates = sortByNetYield(getEvidenceRows(state.rows));
      if (!candidates.length) return "";

      let selected = candidates[state.dealTest.selectedIndex] || candidates[0];
      const ownerAsk = num(state.dealTest.ownerAsk, num(selected.asking_price_aed));
      const targetYield = num(state.dealTest.targetYield, num(selected.risk_adjusted_target_yield_percent));
      const netRent = netRentFromRow(selected);
      const targetPrice = targetYield > 0 ? netRent / (targetYield / 100) : 0;
      const requiredCut = ownerAsk - targetPrice;
      const requiredCutPercent = ownerAsk > 0 ? requiredCut / ownerAsk * 100 : 0;
      const buyCosts = estimatedPurchaseCosts(ownerAsk);
      const totalCash = allInCost(ownerAsk);

      return `
        <section class="card">
          <h2>Dynamic Deal Test Calculator</h2>
          <div class="note">
            Select a tower, enter actual owner asking price and required net yield. The calculator estimates target price and required cut.
          </div>

          <div class="toolbar">
            <select id="dealTowerSelect">
              ${candidates.map((r, idx) => `
                <option value="${idx}" ${idx === state.dealTest.selectedIndex ? "selected" : ""}>${escapeHtml(rowName(r))}</option>
              `).join("")}
            </select>

            <input id="dealOwnerAskInput" type="number" min="0" step="1000" value="${ownerAsk}" placeholder="Owner asking price AED" />
            <input id="dealTargetYieldInput" type="number" min="0" step="0.05" value="${targetYield}" placeholder="Required net yield %" />
          </div>

          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Estimated Net Rent</div>
              <div class="metric-value">AED ${money(netRent)}</div>
              <div class="metric-small">From selected model row</div>
            </div>

            <div class="metric">
              <div class="metric-label">Target Buy Price</div>
              <div class="metric-value">AED ${money(targetPrice)}</div>
              <div class="metric-small">Based on ${pct(targetYield)}% net yield</div>
            </div>

            <div class="metric">
              <div class="metric-label">Required Cut</div>
              <div class="metric-value">AED ${money(requiredCut)}</div>
              <div class="metric-small">${pct(requiredCutPercent)}% vs owner ask</div>
            </div>

            <div class="metric">
              <div class="metric-label">All-in Cash Need</div>
              <div class="metric-value">AED ${money(totalCash)}</div>
              <div class="metric-small">Ask + ${pct(PURCHASE_COST_PERCENT)}% costs</div>
            </div>
          </div>

          <details>
            <summary>How this is calculated</summary>
            <div class="details-box">Net rent is taken from the selected model row:
current price × current net yield.

Target buy price = estimated net rent ÷ required net yield.

Required cut = owner asking price − target buy price.

Purchase-cost estimate = owner asking price × ${pct(PURCHASE_COST_PERCENT)}%.
All-in cash need = owner asking price + estimated purchase costs.

This is a screening calculator only. Confirm rent, service charge, unit condition, floor/view, parking, vacancy and transaction evidence before action.</div>
          </details>
        </section>
      `;
    }

    function renderTechnicalAudit() {
      return `
        <section class="card">
          <details>
            <summary><h2 style="display:inline;">Technical Audit</h2></summary>
            <div class="note">Collapsed by default. Use for model QA, evidence checking or pipeline troubleshooting.</div>

            <details>
              <summary>Readiness rules</summary>
              <div class="details-box">Decision-ready = strict / high-confidence direct evidence.

Interim-screened = Property Finder DLD-derived transaction/rent evidence plus manually entered DLD Service Charge Index. Useful for screening and target pricing, not final offer.

Needs evidence = missing sale or rent evidence.

Budget monitor = normal evidence suggests price is above AED 1.6m budget cap; monitor only for distressed / below-market cases.

Deal test = scenario only.</div>
            </details>

            <details>
              <summary>Raw watchlist view rows</summary>
              <div class="details-box">${escapeHtml(JSON.stringify(state.rows, null, 2))}</div>
            </details>

            <details>
              <summary>Raw macro context</summary>
              <div class="details-box">${escapeHtml(JSON.stringify(state.contextRows[0] || {}, null, 2))}</div>
            </details>

            <details>
              <summary>Raw bank context</summary>
              <div class="details-box">${escapeHtml(JSON.stringify(state.bankRows[0] || {}, null, 2))}</div>
            </details>
          </details>
        </section>
      `;
    }

    function renderDashboard() {
      document.getElementById("app").innerHTML = `
        ${renderExecutiveDecision()}

        <div class="layout-two">
          ${renderMacroPanel()}
          ${renderBankPanel()}
        </div>

        ${renderWatchlist()}

        ${renderDealTestCalculator()}

        ${renderEvidenceMap()}

        ${renderTechnicalAudit()}
      `;

      attachEvents();
    }

    function attachEvents() {
      const searchInput = document.getElementById("searchInput");
      const readinessSelect = document.getElementById("readinessSelect");
      const realismSelect = document.getElementById("realismSelect");

      if (searchInput) {
        searchInput.addEventListener("input", (e) => {
          state.filters.search = e.target.value;
          renderDashboard();
        });
      }

      if (readinessSelect) {
        readinessSelect.value = state.filters.readiness;
        readinessSelect.addEventListener("change", (e) => {
          state.filters.readiness = e.target.value;
          renderDashboard();
        });
      }

      if (realismSelect) {
        realismSelect.value = state.filters.realism;
        realismSelect.addEventListener("change", (e) => {
          state.filters.realism = e.target.value;
          renderDashboard();
        });
      }

      const dealTowerSelect = document.getElementById("dealTowerSelect");
      const dealOwnerAskInput = document.getElementById("dealOwnerAskInput");
      const dealTargetYieldInput = document.getElementById("dealTargetYieldInput");

      if (dealTowerSelect) {
        dealTowerSelect.addEventListener("change", (e) => {
          state.dealTest.selectedIndex = Number(e.target.value);
          const candidates = sortByNetYield(getEvidenceRows(state.rows));
          const selected = candidates[state.dealTest.selectedIndex] || candidates[0];
          state.dealTest.ownerAsk = selected ? selected.asking_price_aed : "";
          state.dealTest.targetYield = selected ? selected.risk_adjusted_target_yield_percent : "";
          renderDashboard();
        });
      }

      if (dealOwnerAskInput) {
        dealOwnerAskInput.addEventListener("input", (e) => {
          state.dealTest.ownerAsk = e.target.value;
          renderDashboard();
        });
      }

      if (dealTargetYieldInput) {
        dealTargetYieldInput.addEventListener("input", (e) => {
          state.dealTest.targetYield = e.target.value;
          renderDashboard();
        });
      }
    }

    async function loadDashboard() {
      const app = document.getElementById("app");

      try {
        const watchlistRows = await restGet(VIEW_WATCHLIST, "select=*&order=created_at.desc");

        if (!Array.isArray(watchlistRows) || watchlistRows.length === 0) {
          app.innerHTML = `
            <section class="card">
              <h2>No Data</h2>
              <div class="banner warn">
                No rows returned from <code>${VIEW_WATCHLIST}</code>.
                Run the full n8n workflow and verify the Supabase view.
              </div>
            </section>
          `;
          return;
        }

        const latestRunId = watchlistRows[0].run_id;

        let contextRows = [];
        let bankRows = [];

        try {
          contextRows = await restGet(TABLE_AGENT_CONTEXT, `select=*&run_id=eq.${encodeURIComponent(latestRunId)}&order=created_at.desc&limit=1`);
        } catch (error) {
          contextRows = [];
        }

        try {
          bankRows = await restGet(TABLE_BANK_CONTEXT, `select=*&run_id=eq.${encodeURIComponent(latestRunId)}&order=created_at.desc&limit=1`);
        } catch (error) {
          bankRows = [];
        }

        if (!contextRows.length) {
          try { contextRows = await restGet(TABLE_AGENT_CONTEXT, "select=*&order=created_at.desc&limit=1"); } catch { contextRows = []; }
        }

        if (!bankRows.length) {
          try { bankRows = await restGet(TABLE_BANK_CONTEXT, "select=*&order=created_at.desc&limit=1"); } catch { bankRows = []; }
        }

        state.rows = watchlistRows;
        state.contextRows = contextRows;
        state.bankRows = bankRows;

        const candidates = sortByNetYield(getEvidenceRows(state.rows));
        if (candidates.length) {
          state.dealTest.selectedIndex = 0;
          state.dealTest.ownerAsk = candidates[0].asking_price_aed;
          state.dealTest.targetYield = candidates[0].risk_adjusted_target_yield_percent;
        }

        renderDashboard();

      } catch (error) {
        app.innerHTML = `
          <section class="card">
            <h2>Load Error</h2>
            <div class="banner bad">${escapeHtml(error.message || "Unknown JavaScript or REST error.")}</div>
            <div class="note">
              Check that <code>${VIEW_WATCHLIST}</code> exists, is exposed via REST,
              and that anon/publishable-key SELECT access is allowed.
            </div>
          </section>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JLT Investment Agent</title>

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #17202a;
      --muted: #5d6d7e;
      --border: #dfe4ea;
      --good: #0b7a3b;
      --warn: #b26a00;
      --bad: #a12626;
      --blue: #1f5fbf;
      --soft-blue: #eef4ff;
      --soft-warn: #fff6e5;
      --soft-bad: #fff0f0;
      --soft-good: #eefaf2;
      --shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    code {
      background: #eef1f4;
      padding: 2px 5px;
      border-radius: 6px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(160px, 1fr));
      gap: 12px;
    }

    .metric {
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 88px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric-value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 700;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .banner {
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: #fafbfc;
    }

    .banner.warn {
      background: var(--soft-warn);
      border-color: #ffd38a;
    }

    .banner.bad {
      background: var(--soft-bad);
      border-color: #ffb4b4;
    }

    .banner.good {
      background: var(--soft-good);
      border-color: #b7e5c7;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #f8f9fa;
      white-space: nowrap;
    }

    .pill.good {
      color: var(--good);
      background: var(--soft-good);
      border-color: #b7e5c7;
    }

    .pill.warn {
      color: var(--warn);
      background: var(--soft-warn);
      border-color: #ffd38a;
    }

    .pill.bad {
      color: var(--bad);
      background: var(--soft-bad);
      border-color: #ffb4b4;
    }

    .pill.blue {
      color: var(--blue);
      background: var(--soft-blue);
      border-color: #bdd3ff;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1180px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f1f4f7;
      color: #2d3748;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.035em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .num {
      text-align: right;
      white-space: nowrap;
    }

    details {
      cursor: pointer;
    }

    summary {
      color: var(--blue);
      font-weight: 700;
      font-size: 13px;
    }

    .details-box {
      margin-top: 8px;
      color: var(--muted);
      max-width: 850px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    a {
      color: var(--blue);
      word-break: break-word;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    .loading {
      padding: 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cfd6df;
      border-top: 2px solid var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 8px;
      vertical-align: -2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(2, minmax(160px, 1fr));
      }
    }

    @media (max-width: 650px) {
      .container {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>JLT Investment Agent</h1>
      <div class="subtitle">Macro-aware, finance-driven JLT ready-apartment screening</div>
    </header>

    <div id="app" class="loading">
      <span class="spinner"></span>Loading latest run...
    </div>
  </div>

  <script>
    // =========================================================
    // SUPABASE REST CONFIG
    // You provided the REST endpoint, so this page uses fetch()
    // directly rather than supabase-js.
    // =========================================================
    const SUPABASE_REST_URL = "https://cndyxfprqpfkzypxhrxl.supabase.co/rest/v1";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VOIytNYEBG7FyZzQqqW66w_nJWK37TC";

    const VIEW_NAME = "dashboard_latest_candidate_classification";

    const AED = new Intl.NumberFormat("en-AE", {
      maximumFractionDigits: 0
    });

    const NUM = new Intl.NumberFormat("en-AE", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    function safe(v, fallback = "") {
      return v === null || v === undefined || v === "" ? fallback : v;
    }

    function money(v) {
      const n = Number(v || 0);
      return n === 0 ? "0" : AED.format(n);
    }

    function pct(v) {
      const n = Number(v || 0);
      return NUM.format(n);
    }

    function dateTime(v) {
      if (!v) return "N/A";
      try {
        return new Date(v).toLocaleString();
      } catch {
        return v;
      }
    }

    function pill(text) {
      const t = String(text || "").toUpperCase();

      if (t.includes("BUY")) return `<span class="pill good">${text}</span>`;
      if (t.includes("WATCH")) return `<span class="pill warn">${text}</span>`;
      if (t.includes("PASS")) return `<span class="pill bad">${text}</span>`;
      if (t.includes("DATA")) return `<span class="pill bad">${text}</span>`;
      if (t.includes("DEAL")) return `<span class="pill blue">${text}</span>`;
      if (t.includes("OUT")) return `<span class="pill bad">${text}</span>`;

      return `<span class="pill">${safe(text, "N/A")}</span>`;
    }

    function sourceDetails(row) {
      const parts = [
        `Price source: ${safe(row.price_source_note, "N/A")}`,
        `Rent source: ${safe(row.rent_source_note, "N/A")}`,
        `Service charge source: ${safe(row.service_charge_source_note, "N/A")}`,
        `Bank benchmark: ${safe(row.bank_benchmark_source_note, "N/A")}`,
        `Bucket: ${safe(row.dashboard_bucket, "N/A")}`,
        `Bucket note: ${safe(row.dashboard_bucket_note, "N/A")}`,
        `Decision reason: ${safe(row.decision_reason, "N/A")}`
      ];

      return parts.join("\n\n");
    }

    function rowUnit(row) {
      return `${safe(row.tower)} ${safe(row.unit_type)}`;
    }

    function getLatestRun(rows) {
      if (!rows.length) return null;
      return rows[0].run_id;
    }

    function sortByNetYieldDesc(rows) {
      return [...rows].sort((a, b) => Number(b.net_yield_percent || 0) - Number(a.net_yield_percent || 0));
    }

    function sortByFinalScoreDesc(rows) {
      return [...rows].sort((a, b) => Number(b.final_score || 0) - Number(a.final_score || 0));
    }

    function renderRankingTable(rows, options = {}) {
      const showEvidence = options.showEvidence !== false;

      if (!rows.length) {
        return `<div class="banner">No rows available.</div>`;
      }

      const sorted = options.sortBy === "final_score"
        ? sortByFinalScoreDesc(rows)
        : sortByNetYieldDesc(rows);

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Tower</th>
                <th>Unit</th>
                <th class="num">Price AED</th>
                <th class="num">Rent AED/yr</th>
                <th class="num">SC AED/sqft</th>
                <th class="num">Net Yield %</th>
                <th class="num">5Y IRR %</th>
                <th class="num">IRR vs Bank %</th>
                <th class="num">Strong-Buy Price</th>
                <th class="num">Required Cut</th>
                <th class="num">Required Cut %</th>
                <th>Verdict</th>
                <th>Action</th>
                ${showEvidence ? "<th>Evidence</th>" : ""}
              </tr>
            </thead>
            <tbody>
              ${sorted.map((r, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td>${safe(r.tower)}</td>
                  <td>${safe(r.unit_type)}</td>
                  <td class="num">${money(r.asking_price_aed)}</td>
                  <td class="num">${money(r.estimated_annual_rent_aed)}</td>
                  <td class="num">${pct(r.service_charge_aed_sqft_year)}</td>
                  <td class="num">${pct(r.net_yield_percent)}</td>
                  <td class="num">${pct(r.irr_5y_percent)}</td>
                  <td class="num">${pct(r.irr_vs_bank_percent)}</td>
                  <td class="num">${money(r.strong_buy_price_aed)}</td>
                  <td class="num">${money(r.discount_to_6_5_target_aed)}</td>
                  <td class="num">${pct(r.discount_to_6_5_target_percent)}%</td>
                  <td>${pill(r.final_decision)}</td>
                  <td>${safe(r.action_label)}</td>
                  ${showEvidence ? `
                    <td>
                      <details>
                        <summary>View notes</summary>
                        <div class="details-box">${sourceDetails(r)}</div>
                      </details>
                    </td>
                  ` : ""}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDataGapTable(rows) {
      if (!rows.length) {
        return `<div class="banner good">No data-gap rows in latest run.</div>`;
      }

      const sorted = [...rows].sort((a, b) =>
        String(a.tower).localeCompare(String(b.tower)) ||
        String(a.unit_type).localeCompare(String(b.unit_type))
      );

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tower</th>
                <th>Unit</th>
                <th class="num">Price AED</th>
                <th class="num">Rent AED/yr</th>
                <th class="num">SC AED/sqft</th>
                <th>Status</th>
                <th>Required Action</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map(r => `
                <tr>
                  <td>${safe(r.tower)}</td>
                  <td>${safe(r.unit_type)}</td>
                  <td class="num">${money(r.asking_price_aed)}</td>
                  <td class="num">${money(r.estimated_annual_rent_aed)}</td>
                  <td class="num">${pct(r.service_charge_aed_sqft_year)}</td>
                  <td>${pill(r.final_decision)}</td>
                  <td>${safe(r.action_label)}</td>
                  <td>
                    <details>
                      <summary>View notes</summary>
                      <div class="details-box">${sourceDetails(r)}</div>
                    </details>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderTopCandidate(interimRows, strictRows) {
      const available = [...strictRows, ...interimRows];

      if (!available.length) {
        return `
          <div class="banner bad">
            <strong>No evidence-based candidate available.</strong><br>
            Add sale/rent evidence or promote interim evidence rows before analysis.
          </div>
        `;
      }

      const best = sortByNetYieldDesc(available)[0];

      return `
        <div class="banner warn">
          <strong>Best current evidence-based candidate:</strong>
          ${rowUnit(best)} — net yield ${pct(best.net_yield_percent)}%, 5Y IRR ${pct(best.irr_5y_percent)}%,
          IRR vs bank ${pct(best.irr_vs_bank_percent)}%.
          Verdict: <strong>${safe(best.final_decision)}</strong>.
          Strong-buy price is about AED ${money(best.strong_buy_price_aed)}.
          Required cut is AED ${money(best.discount_to_6_5_target_aed)}
          (${pct(best.discount_to_6_5_target_percent)}%).
        </div>
      `;
    }

    function renderExecutiveSummary(rows) {
      const strictRows = rows.filter(r => r.dashboard_bucket === "STRICT_EVIDENCE");
      const interimRows = rows.filter(r => r.dashboard_bucket === "INTERIM_EVIDENCE");
      const dataGapRows = rows.filter(r => r.dashboard_bucket === "DATA_GAP");
      const dealRows = rows.filter(r => r.dashboard_bucket === "DEAL_TEST");

      const latestRun = getLatestRun(rows);
      const latestTime = rows.length ? dateTime(rows[0].created_at) : "N/A";
      const bankRow = rows.find(r => r.bank_yield_percent !== null && r.bank_yield_percent !== undefined) || {};
      const bankRate = bankRow.bank_yield_percent ?? 3.5;
      const bankQuality = bankRow.bank_source_quality || "N/A";

      const buyLike = [...strictRows, ...interimRows].filter(r =>
        String(r.final_decision || "").includes("BUY")
      );

      const best = sortByNetYieldDesc([...strictRows, ...interimRows])[0];

      return `
        <section class="card">
          <div class="section-header">
            <div>
              <h2>Latest Data Update</h2>
              <div class="note">
                Loaded latest run from <code>${VIEW_NAME}</code>.
                Run ID: <strong>${safe(latestRun, "N/A")}</strong>
              </div>
            </div>
          </div>

          <div class="grid" style="margin-top: 14px;">
            <div class="metric">
              <div class="metric-label">Last Run</div>
              <div class="metric-value">${latestTime}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Strict Evidence</div>
              <div class="metric-value">${strictRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Interim Evidence</div>
              <div class="metric-value">${interimRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Data-Gap Rows</div>
              <div class="metric-value">${dataGapRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Deal Tests</div>
              <div class="metric-value">${dealRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Bank Benchmark</div>
              <div class="metric-value">${pct(bankRate)}% / ${bankQuality}</div>
            </div>
          </div>

          ${renderTopCandidate(interimRows, strictRows)}

          <div class="banner ${buyLike.length ? "good" : "warn"}">
            <strong>Decision status:</strong>
            ${buyLike.length
              ? `${buyLike.length} candidate(s) meet a buy-type gate. Validate source evidence before action.`
              : `No current candidate meets the buy gate at current median transaction economics. Use the dashboard for price-target monitoring and negotiation discipline.`
            }
          </div>

          ${best ? `
            <div class="note">
              Best current evidence-based screening result is <strong>${rowUnit(best)}</strong>.
              It remains below the 6.5% strong-buy net-yield trigger unless the price moves closer to AED ${money(best.strong_buy_price_aed)}.
            </div>
          ` : ""}
        </section>
      `;
    }

    function renderDashboard(rows) {
      const strictRows = rows.filter(r => r.dashboard_bucket === "STRICT_EVIDENCE");
      const interimRows = rows.filter(r => r.dashboard_bucket === "INTERIM_EVIDENCE");
      const dataGapRows = rows.filter(r => r.dashboard_bucket === "DATA_GAP");
      const dealRows = rows.filter(r => r.dashboard_bucket === "DEAL_TEST");
      const reviewRows = rows.filter(r => r.dashboard_bucket === "REVIEW_REQUIRED");

      return `
        ${renderExecutiveSummary(rows)}

        <section class="card">
          <h2>Deal Test Results</h2>
          <div class="note">
            Deal-test rows are scenario checks only. They are excluded from ranking and should not be treated as validated candidates unless promoted through the evidence register.
          </div>
          ${renderRankingTable(dealRows, { showEvidence: true })}
        </section>

        <section class="card">
          <h2>Strict Evidence-Based Ranking</h2>
          <div class="note">
            Direct DLD/Ejari/HIGH-confidence rows only. Current count: <strong>${strictRows.length}</strong>.
          </div>
          ${strictRows.length
            ? renderRankingTable(strictRows, { showEvidence: true, sortBy: "final_score" })
            : `<div class="banner">No strict HIGH-confidence / direct-DLD candidates available yet.</div>`
          }
        </section>

        <section class="card">
          <h2>Interim Evidence-Based Screening</h2>
          <div class="note">
            Property Finder DLD-derived transaction/rent evidence plus user-entered 2026 DLD Service Charge Index readings.
            Use this section for screening and negotiation targets only. Validate with direct DLD/Ejari before purchase action.
          </div>
          ${renderRankingTable(interimRows, { showEvidence: true })}
        </section>

        <section class="card">
          <h2>Interim Negotiation Targets</h2>
          <div class="note">
            Strong-buy price is based on the 6.5% net-yield trigger. A positive required cut means the current evidence price is too high.
          </div>
          ${renderRankingTable(interimRows, { showEvidence: false })}
        </section>

        <section class="card">
          <h2>Data Hygiene Queue</h2>
          <div class="note">
            These rows are excluded from evidence-based analysis because they are missing sale/rent evidence, are above budget, or remain unvalidated.
          </div>
          ${renderDataGapTable(dataGapRows)}
        </section>

        ${reviewRows.length ? `
          <section class="card">
            <h2>Manual Review Required</h2>
            ${renderDataGapTable(reviewRows)}
          </section>
        ` : ""}

        <section class="card">
          <h2>Decision Reliability</h2>
          <div class="grid">
            <div class="metric">
              <div class="metric-label">Strict Evidence Candidates</div>
              <div class="metric-value">${strictRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Interim Evidence Candidates</div>
              <div class="metric-value">${interimRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Data Gaps</div>
              <div class="metric-value">${dataGapRows.length}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Deal Tests</div>
              <div class="metric-value">${dealRows.length}</div>
            </div>
          </div>

          <div class="banner warn">
            <strong>Reliability note:</strong>
            Interim evidence is suitable for screening, watchlist ranking and negotiation target setting.
            It is not final investment evidence until reconciled against direct DLD/Ejari or equivalent primary data.
          </div>

          <details style="margin-top: 10px;">
            <summary>Evidence rules</summary>
            <div class="details-box">Strict evidence = direct DLD/Ejari/HIGH-confidence source.

Interim evidence = Property Finder DLD-derived transaction/rent evidence plus user-entered DLD Service Charge Index readings.

Data gap = missing sale/rent evidence, zero placeholder values, out-of-budget candidate, or unvalidated/manual input.

Deal test = scenario only and excluded from ranking.</div>
          </details>
        </section>
      `;
    }

    async function fetchWithTimeout(url, options, timeoutMs = 15000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });
        clearTimeout(timeout);
        return response;
      } catch (error) {
        clearTimeout(timeout);
        throw error;
      }
    }

    async function loadDashboard() {
      const app = document.getElementById("app");

      try {
        const url =
          `${SUPABASE_REST_URL}/${VIEW_NAME}` +
          `?select=*` +
          `&order=created_at.desc`;

        const response = await fetchWithTimeout(url, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_PUBLISHABLE_KEY,
            "Authorization": `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
            "Accept": "application/json"
          }
        }, 15000);

        const text = await response.text();

        if (!response.ok) {
          app.innerHTML = `
            <section class="card">
              <h2>Load Error</h2>
              <div class="banner bad">
                REST request failed with status <strong>${response.status}</strong>.
              </div>
              <div class="details-box">${text}</div>
              <div class="note">
                Check that <code>public.${VIEW_NAME}</code> exists and anon/publishable-key SELECT access is allowed.
              </div>
            </section>
          `;
          return;
        }

        let data;

        try {
          data = JSON.parse(text);
        } catch (parseError) {
          app.innerHTML = `
            <section class="card">
              <h2>Parse Error</h2>
              <div class="banner bad">
                Response was not valid JSON.
              </div>
              <div class="details-box">${text}</div>
            </section>
          `;
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          app.innerHTML = `
            <section class="card">
              <h2>No Data</h2>
              <div class="banner warn">
                No rows returned from <code>${VIEW_NAME}</code>.
                Run the full n8n workflow first and verify the view in Supabase SQL Editor.
              </div>
            </section>
          `;
          return;
        }

        app.innerHTML = renderDashboard(data);

      } catch (error) {
        app.innerHTML = `
          <section class="card">
            <h2>Load Error</h2>
            <div class="banner bad">
              ${safe(error.message, "Unknown JavaScript or network error.")}
            </div>
            <div class="note">
              If this stays on GitHub Pages, open browser Developer Tools → Console.
              Common causes: view not exposed to REST, RLS SELECT blocked, wrong project/key, or network/CORS issue.
            </div>
          </section>
        `;
      }
    }

    loadDashboard();
  </script>

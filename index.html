<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JLT Investment Agent</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f6f7f9;
      color: #222;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .status {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #eef1f5;
    }

    .decision-buy {
      color: green;
      font-weight: bold;
    }

    .decision-watch {
      color: orange;
      font-weight: bold;
    }

    .decision-avoid {
      color: red;
      font-weight: bold;
    }

    .error {
      color: red;
      font-weight: bold;
    }

    .small-note {
      font-size: 13px;
      color: #777;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>JLT Investment Agent</h1>
  <div class="subtitle">Live dashboard for JLT property investment screening</div>

  <div class="card">
    <h2>Latest Observation</h2>
    <div id="status" class="status">Loading live data from Supabase...</div>
    <p id="latest-summary">Loading...</p>
    <div class="small-note">
      Dashboard shows only the latest full n8n run using run_id.
    </div>
  </div>

  <div class="card">
    <h2>Property Observations</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Tower</th>
          <th>Unit</th>
          <th>Price AED</th>
          <th>Gross Yield %</th>
          <th>Net Yield %</th>
          <th>Decision</th>
        </tr>
      </thead>
      <tbody id="observations-table">
        <tr>
          <td colspan="7">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const SUPABASE_URL = "https://cndyxfprqpfkzypxhrxl.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VOIytNYEBG7FyZzQqqW66w_nJWK37TC";
    const TABLE_NAME = "property_observations";

    function getSupabaseHeaders() {
      return {
        "apikey": SUPABASE_PUBLISHABLE_KEY,
        "Authorization": `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
        "Content-Type": "application/json"
      };
    }

    function formatDecision(decision) {
      if (!decision) return "";

      const lower = decision.toLowerCase();

      if (lower.includes("buy")) {
        return `<span class="decision-buy">${decision}</span>`;
      }

      if (lower.includes("watch")) {
        return `<span class="decision-watch">${decision}</span>`;
      }

      if (lower.includes("avoid")) {
        return `<span class="decision-avoid">${decision}</span>`;
      }

      return decision;
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      return new Date(dateString).toLocaleString();
    }

    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "";
      return Number(value).toLocaleString();
    }

    async function fetchLatestRunId() {
      const url =
        `${SUPABASE_URL}/rest/v1/${TABLE_NAME}` +
        `?select=run_id,created_at` +
        `&run_id=not.is.null` +
        `&order=created_at.desc` +
        `&limit=1`;

      const response = await fetch(url, {
        method: "GET",
        headers: getSupabaseHeaders()
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`Supabase latest run error ${response.status}: ${errorText}`);
      }

      const data = await response.json();

      if (!data || data.length === 0) {
        return null;
      }

      return data[0].run_id;
    }

    async function fetchObservationsByRunId(runId) {
      const url =
        `${SUPABASE_URL}/rest/v1/${TABLE_NAME}` +
        `?select=created_at,run_id,tower,unit_type,asking_price_aed,gross_yield_percent,net_yield_percent,decision,summary` +
        `&run_id=eq.${encodeURIComponent(runId)}` +
        `&order=net_yield_percent.desc`;

      const response = await fetch(url, {
        method: "GET",
        headers: getSupabaseHeaders()
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`Supabase observations error ${response.status}: ${errorText}`);
      }

      return await response.json();
    }

    async function fetchObservations() {
      const latestRunId = await fetchLatestRunId();

      if (!latestRunId) {
        return [];
      }

      return await fetchObservationsByRunId(latestRunId);
    }

    function renderDashboard(data) {
      const status = document.getElementById("status");
      const latestSummary = document.getElementById("latest-summary");
      const tableBody = document.getElementById("observations-table");

      if (!data || data.length === 0) {
        status.textContent = "Connected to Supabase, but no latest run rows found.";
        latestSummary.textContent = "No property observations available.";
        tableBody.innerHTML = `<tr><td colspan="7">No data available</td></tr>`;
        return;
      }

      const latest = data[0];
      const runTime = latest.created_at ? formatDate(latest.created_at) : "unknown time";

      status.textContent = `Loaded latest full run: ${data.length} row(s). Run time: ${runTime}.`;
      latestSummary.textContent = latest.summary || "No summary available.";

      tableBody.innerHTML = "";

      data.forEach(row => {
        tableBody.innerHTML += `
          <tr>
            <td>${formatDate(row.created_at)}</td>
            <td>${row.tower || ""}</td>
            <td>${row.unit_type || ""}</td>
            <td>${formatNumber(row.asking_price_aed)}</td>
            <td>${row.gross_yield_percent ?? ""}</td>
            <td>${row.net_yield_percent ?? ""}</td>
            <td>${formatDecision(row.decision)}</td>
          </tr>
        `;
      });
    }

    async function main() {
      try {
        const data = await fetchObservations();
        renderDashboard(data);
      } catch (error) {
        document.getElementById("status").innerHTML =
          `<span class="error">Failed to load Supabase data.</span>`;

        document.getElementById("latest-summary").textContent = error.message;

        document.getElementById("observations-table").innerHTML =
          `<tr><td colspan="7">${error.message}</td></tr>`;

        console.error(error);
      }
    }

    main();
  </script>

</body>
</html>

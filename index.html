<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JLT Investment Agent</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f6f7f9;
      color: #222;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #eef1f5;
    }

    .decision-buy {
      color: green;
      font-weight: bold;
    }

    .decision-watch {
      color: orange;
      font-weight: bold;
    }

    .decision-avoid {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>JLT Investment Agent</h1>
  <div class="subtitle">Simple dashboard for JLT property investment screening</div>

  <div class="card">
    <h2>Latest Observation</h2>
    <p id="latest-summary">Loading...</p>
  </div>

  <div class="card">
    <h2>Property Observations</h2>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Tower</th>
          <th>Unit</th>
          <th>Price AED</th>
          <th>Net Yield %</th>
          <th>Decision</th>
        </tr>
      </thead>
      <tbody id="observations-table">
        <tr>
          <td colspan="6">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    // We will connect this to Supabase in the next step.
    const sampleData = [
      {
        created_at: "2026-05-04T02:36:50.243422+00:00",
        tower: "Green Lakes",
        unit_type: "2BR",
        asking_price_aed: 1500000,
        net_yield_percent: 6.39,
        decision: "Watch",
        summary: "Green Lakes 2BR: Net yield is 6.39%. Decision: Watch."
      }
    ];

    function formatDecision(decision) {
      const lower = decision.toLowerCase();

      if (lower.includes("buy")) {
        return `<span class="decision-buy">${decision}</span>`;
      }

      if (lower.includes("watch")) {
        return `<span class="decision-watch">${decision}</span>`;
      }

      if (lower.includes("avoid")) {
        return `<span class="decision-avoid">${decision}</span>`;
      }

      return decision;
    }

    function renderDashboard(data) {
      const latest = data[0];

      document.getElementById("latest-summary").textContent = latest.summary;

      const tableBody = document.getElementById("observations-table");
      tableBody.innerHTML = "";

      data.forEach(row => {
        const date = new Date(row.created_at).toLocaleDateString();

        tableBody.innerHTML += `
          <tr>
            <td>${date}</td>
            <td>${row.tower}</td>
            <td>${row.unit_type}</td>
            <td>${Number(row.asking_price_aed).toLocaleString()}</td>
            <td>${row.net_yield_percent}</td>
            <td>${formatDecision(row.decision)}</td>
          </tr>
        `;
      });
    }

    renderDashboard(sampleData);
  </script>

</body>
</html>

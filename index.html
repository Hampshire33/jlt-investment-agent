<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JLT Investment Agent</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --card-soft: #fbfcfd;
      --text: #16202a;
      --muted: #64717f;
      --border: #dce3ea;
      --border-strong: #c9d3dd;

      --blue: #1f5fbf;
      --green: #0b7a3b;
      --amber: #b26a00;
      --red: #a12626;
      --purple: #6346b8;

      --soft-blue: #eef4ff;
      --soft-green: #eefaf2;
      --soft-amber: #fff6e5;
      --soft-red: #fff0f0;
      --soft-purple: #f3f0ff;

      --shadow: 0 8px 22px rgba(0, 0, 0, 0.055);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 22px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    code {
      background: #eef1f4;
      padding: 2px 5px;
      border-radius: 6px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 15px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--blue);
      font-weight: 700;
      border-radius: 11px;
      padding: 9px 12px;
      cursor: pointer;
    }

    button:hover {
      background: var(--soft-blue);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }

    .decision-card {
      border-left: 8px solid var(--amber);
    }

    .decision-card.buy {
      border-left-color: var(--green);
    }

    .decision-card.no-buy {
      border-left-color: var(--red);
    }

    .layout-two {
      display: grid;
      grid-template-columns: 1.12fr 0.88fr;
      gap: 16px;
      margin-top: 16px;
    }

    .layout-three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .grid-four {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .metric {
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 86px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric-value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 800;
    }

    .metric-small {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .decision-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .decision-subtitle {
      font-size: 16px;
      color: var(--muted);
      max-width: 980px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .small-text {
      color: var(--muted);
      font-size: 12px;
    }

    .banner {
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: var(--card-soft);
    }

    .banner.good {
      background: var(--soft-green);
      border-color: #b7e5c7;
    }

    .banner.warn {
      background: var(--soft-amber);
      border-color: #ffd38a;
    }

    .banner.bad {
      background: var(--soft-red);
      border-color: #ffb4b4;
    }

    .banner.blue {
      background: var(--soft-blue);
      border-color: #bdd3ff;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--border);
      background: #f8f9fa;
      white-space: nowrap;
    }

    .pill.good {
      color: var(--green);
      background: var(--soft-green);
      border-color: #b7e5c7;
    }

    .pill.warn {
      color: var(--amber);
      background: var(--soft-amber);
      border-color: #ffd38a;
    }

    .pill.bad {
      color: var(--red);
      background: var(--soft-red);
      border-color: #ffb4b4;
    }

    .pill.blue {
      color: var(--blue);
      background: var(--soft-blue);
      border-color: #bdd3ff;
    }

    .pill.purple {
      color: var(--purple);
      background: var(--soft-purple);
      border-color: #d3c7ff;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .toolbar input,
    .toolbar select {
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      min-height: 38px;
      font-size: 14px;
    }

    .toolbar input {
      min-width: 260px;
      flex: 1;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f1f4f7;
      color: #2d3748;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.035em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .num {
      text-align: right;
      white-space: nowrap;
    }

    details {
      cursor: pointer;
      margin-top: 10px;
    }

    summary {
      color: var(--blue);
      font-weight: 800;
      font-size: 13px;
    }

    .details-box {
      margin-top: 8px;
      color: var(--muted);
      max-width: 1080px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }

    .loading {
      padding: 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cfd6df;
      border-top: 2px solid var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 8px;
      vertical-align: -2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .mini-list {
      margin: 8px 0 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .mini-list li {
      margin: 4px 0;
    }

    .candidate-title {
      font-weight: 800;
      color: var(--text);
    }

    .nowrap {
      white-space: nowrap;
    }

    @media (max-width: 1120px) {
      .layout-two,
      .layout-three {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }

      .grid-four {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }
    }

    @media (max-width: 680px) {
      .container {
        padding: 14px;
      }

      .grid,
      .grid-four {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }

      .decision-title {
        font-size: 24px;
      }

      .toolbar input {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div>
        <h1>JLT Investment Agent</h1>
        <div class="subtitle">Macro-aware, finance-driven JLT ready-apartment screening</div>
      </div>
      <div class="top-actions">
        <button onclick="window.location.reload()">Refresh</button>
      </div>
    </header>

    <div id="app" class="loading">
      <span class="spinner"></span>Loading latest run...
    </div>
  </div>

  <script>
    const SUPABASE_REST_URL = "https://cndyxfprqpfkzypxhrxl.supabase.co/rest/v1";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VOIytNYEBG7FyZzQqqW66w_nJWK37TC";

    const VIEW_WATCHLIST = "dashboard_decision_watchlist_v";
    const TABLE_AGENT_CONTEXT = "agent_run_context";
    const TABLE_BANK_CONTEXT = "bank_benchmark_context";

    const AED = new Intl.NumberFormat("en-AE", { maximumFractionDigits: 0 });
    const NUM = new Intl.NumberFormat("en-AE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const state = {
      rows: [],
      contextRows: [],
      bankRows: [],
      filters: {
        search: "",
        readiness: "ALL",
        realism: "ALL"
      }
    };

    function safe(v, fallback = "") {
      return v === null || v === undefined || v === "" ? fallback : v;
    }

    function num(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function money(v) {
      const n = num(v);
      return n === 0 ? "0" : AED.format(n);
    }

    function pct(v) {
      return NUM.format(num(v));
    }

    function dateTime(v) {
      if (!v) return "N/A";
      try {
        return new Date(v).toLocaleString();
      } catch {
        return v;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeTextBlock(text) {
      const s = String(text || "").trim();
      return s || "No text available.";
    }

    function rowName(row) {
      return `${safe(row.tower)} ${safe(row.unit_type)}`.trim();
    }

    function pill(text, tone = null) {
      const t = String(text || "").toUpperCase();
      let cls = tone;

      if (!cls) {
        if (t.includes("BUY") || t.includes("REALISTIC") || t.includes("READY")) cls = "good";
        else if (t.includes("POSSIBLE") || t.includes("DIFFICULT") || t.includes("INTERIM") || t.includes("WATCH")) cls = "warn";
        else if (t.includes("UNLIKELY") || t.includes("NEEDS") || t.includes("DATA") || t.includes("PASS")) cls = "bad";
        else if (t.includes("MONITOR") || t.includes("DEAL")) cls = "blue";
        else cls = "";
      }

      return `<span class="pill ${cls}">${escapeHtml(safe(text, "N/A"))}</span>`;
    }

    function readinessLabel(status) {
      const s = String(status || "").toUpperCase();

      if (s === "DECISION_READY") return "Decision-ready";
      if (s === "INTERIM_SCREENED") return "Interim-screened";
      if (s === "NEEDS_EVIDENCE") return "Needs evidence";
      if (s === "BUDGET_MONITOR") return "Budget monitor";
      if (s === "DEAL_TEST") return "Deal test";
      return "Review";
    }

    function dailyActionLabel(action) {
      const s = String(action || "").toUpperCase();

      if (s === "VALIDATE_BEFORE_OFFER") return "Validate before offer";
      if (s === "TRACK_AND_NEGOTIATE_ONLY_IF_SELLER_MOTIVATED") return "Track; negotiate only if seller motivated";
      if (s === "WATCH_ONLY_PRICE_TOO_HIGH") return "Watch only — price too high";
      if (s === "COMPLETE_EVIDENCE_FIRST") return "Complete evidence first";
      if (s === "SCENARIO_ONLY") return "Scenario only";
      return safe(action, "Review");
    }

    function sortByNetYield(rows) {
      return [...rows].sort((a, b) => num(b.net_yield_percent) - num(a.net_yield_percent));
    }

    function sortByActionPriority(rows) {
      const order = {
        "VALIDATE_BEFORE_OFFER": 1,
        "TRACK_AND_NEGOTIATE_ONLY_IF_SELLER_MOTIVATED": 2,
        "WATCH_ONLY_PRICE_TOO_HIGH": 3,
        "COMPLETE_EVIDENCE_FIRST": 4,
        "SCENARIO_ONLY": 5,
        "REVIEW": 6
      };

      return [...rows].sort((a, b) => {
        const oa = order[a.daily_action_category] || 99;
        const ob = order[b.daily_action_category] || 99;

        if (oa !== ob) return oa - ob;
        return num(b.net_yield_percent) - num(a.net_yield_percent);
      });
    }

    function classifyRows(rows) {
      return {
        decisionReady: rows.filter(r => r.readiness_status === "DECISION_READY"),
        interim: rows.filter(r => r.readiness_status === "INTERIM_SCREENED"),
        needsEvidence: rows.filter(r => r.readiness_status === "NEEDS_EVIDENCE"),
        budgetMonitor: rows.filter(r => r.readiness_status === "BUDGET_MONITOR"),
        dealTest: rows.filter(r => r.readiness_status === "DEAL_TEST"),
        review: rows.filter(r => !["DECISION_READY", "INTERIM_SCREENED", "NEEDS_EVIDENCE", "BUDGET_MONITOR", "DEAL_TEST"].includes(r.readiness_status))
      };
    }

    function getEvidenceRows(rows) {
      return rows.filter(r => ["DECISION_READY", "INTERIM_SCREENED"].includes(r.readiness_status));
    }

    function getBestWatch(rows) {
      const evidenceRows = getEvidenceRows(rows);
      return sortByNetYield(evidenceRows)[0] || null;
    }

    function getLatestContext(contextRows) {
      return contextRows[0] || {};
    }

    function getLatestBank(bankRows, rows) {
      return bankRows[0] || rows.find(r => r.bank_yield_percent !== null && r.bank_yield_percent !== undefined) || {};
    }

    function getNegotiationTone(realism) {
      const s = String(realism || "").toUpperCase();
      if (s === "REALISTIC") return "good";
      if (s === "POSSIBLE" || s === "DIFFICULT") return "warn";
      if (s === "UNLIKELY") return "bad";
      return "blue";
    }

    function evidenceDetails(row) {
      return [
        `Readiness: ${readinessLabel(row.readiness_status)}`,
        `Evidence gap / basis: ${safe(row.evidence_gap_reason, "N/A")}`,
        `Next data action: ${safe(row.next_data_action, "N/A")}`,
        `Price source: ${safe(row.price_source_note, "N/A")}`,
        `Rent source: ${safe(row.rent_source_note, "N/A")}`,
        `Service-charge source: ${safe(row.service_charge_source_note, "N/A")}`,
        `Dashboard bucket: ${safe(row.dashboard_bucket, "N/A")}`,
        `Technical verdict: ${safe(row.final_decision, "N/A")}`,
        `Decision reason: ${safe(row.decision_reason, "N/A")}`
      ].join("\n\n");
    }

    function filteredRows(rows) {
      const search = state.filters.search.trim().toLowerCase();
      const readiness = state.filters.readiness;
      const realism = state.filters.realism;

      return rows.filter(row => {
        const haystack = [
          row.tower,
          row.unit_type,
          row.readiness_status,
          row.negotiation_realism,
          row.daily_action_category
        ].join(" ").toLowerCase();

        const searchOk = !search || haystack.includes(search);
        const readinessOk = readiness === "ALL" || row.readiness_status === readiness;
        const realismOk = realism === "ALL" || row.negotiation_realism === realism;

        return searchOk && readinessOk && realismOk;
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs = 15000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeout);
        return response;
      } catch (error) {
        clearTimeout(timeout);
        throw error;
      }
    }

    async function restGet(path, query = "select=*") {
      const url = `${SUPABASE_REST_URL}/${path}?${query}`;

      const response = await fetchWithTimeout(url, {
        method: "GET",
        headers: {
          "apikey": SUPABASE_PUBLISHABLE_KEY,
          "Authorization": `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
          "Accept": "application/json"
        }
      });

      const text = await response.text();

      if (!response.ok) {
        throw new Error(`REST ${path} failed: ${response.status} ${text}`);
      }

      try {
        return JSON.parse(text);
      } catch {
        throw new Error(`REST ${path} returned non-JSON response: ${text}`);
      }
    }

    function renderExecutiveDecision(rows, contextRows, bankRows) {
      const groups = classifyRows(rows);
      const evidenceRows = getEvidenceRows(rows);
      const best = getBestWatch(rows);
      const latestRun = rows[0]?.run_id || "N/A";
      const latestTime = rows[0]?.created_at || null;

      const bank = getLatestBank(bankRows, rows);
      const context = getLatestContext(contextRows);

      const bankRate = bank.benchmark_rate_percent || best?.bank_yield_percent || 3.5;
      const bankQuality = bank.source_quality || best?.bank_source_quality || "HIGH";

      const macroFs = safe(context.financial_stability_score ?? best?.financial_stability_score, "N/A");
      const macroLei = safe(context.proxy_lei_score ?? best?.proxy_lei_score, "N/A");
      const macroConfidence = safe(context.confidence_level ?? best?.macro_confidence, "MEDIUM");

      const buyGateRows = evidenceRows.filter(r =>
        String(r.daily_action_category || "") === "VALIDATE_BEFORE_OFFER" ||
        String(r.final_decision || "").includes("BUY")
      );

      const decisionTitle = buyGateRows.length
        ? "Validate before any offer"
        : "Do not buy now";

      const decisionTone = buyGateRows.length ? "buy" : "no-buy";

      return `
        <section class="card decision-card ${decisionTone}">
          <div class="decision-title">${decisionTitle}</div>
          <div class="decision-subtitle">
            ${best
              ? `Best current watch item is <strong>${escapeHtml(rowName(best))}</strong>, but the required price cut is still ${pct(best.risk_adjusted_required_cut_percent)}% under the risk-adjusted hurdle.`
              : `No evidence-based candidate is currently available.`
            }
          </div>

          <div class="grid">
            <div class="metric">
              <div class="metric-label">Best Watch Item</div>
              <div class="metric-value">${best ? escapeHtml(rowName(best)) : "None"}</div>
              <div class="metric-small">${best ? readinessLabel(best.readiness_status) : "N/A"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Current Net Yield</div>
              <div class="metric-value">${best ? pct(best.net_yield_percent) + "%" : "N/A"}</div>
              <div class="metric-small">Current economics</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk-Adjusted Hurdle</div>
              <div class="metric-value">${best ? pct(best.risk_adjusted_target_yield_percent) + "%" : "N/A"}</div>
              <div class="metric-small">Macro-adjusted trigger</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk-Adjusted Price</div>
              <div class="metric-value">AED ${best ? money(best.risk_adjusted_target_price_aed) : "N/A"}</div>
              <div class="metric-small">Target entry</div>
            </div>
            <div class="metric">
              <div class="metric-label">Required Cut</div>
              <div class="metric-value">AED ${best ? money(best.risk_adjusted_required_cut_aed) : "N/A"}</div>
              <div class="metric-small">${best ? pct(best.risk_adjusted_required_cut_percent) + "% — " + safe(best.negotiation_realism) : "N/A"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Macro / Bank</div>
              <div class="metric-value">FS ${escapeHtml(macroFs)} / LEI ${escapeHtml(macroLei)}</div>
              <div class="metric-small">Bank ${pct(bankRate)}% / ${escapeHtml(bankQuality)} / ${escapeHtml(macroConfidence)}</div>
            </div>
          </div>

          <div class="banner warn">
            <strong>Advisor read:</strong>
            Median-market pricing is not cheap enough. Track only, close evidence gaps, and wait for motivated-seller pricing near the risk-adjusted target.
          </div>

          <div class="note">
            Latest run <strong>${escapeHtml(latestRun)}</strong> at ${dateTime(latestTime)}.
            Decision-ready: <strong>${groups.decisionReady.length}</strong>.
            Interim-screened: <strong>${groups.interim.length}</strong>.
            Needs evidence: <strong>${groups.needsEvidence.length}</strong>.
            Budget monitor: <strong>${groups.budgetMonitor.length}</strong>.
            Deal test: <strong>${groups.dealTest.length}</strong>.
          </div>
        </section>
      `;
    }

    function renderAdvisorActionPanel(rows) {
      const sorted = sortByActionPriority(rows);
      const active = sorted.filter(r => r.readiness_status !== "DEAL_TEST").slice(0, 5);

      return `
        <section class="card">
          <h2>Daily Action Panel</h2>
          <div class="note">What to do next, based on evidence quality, price gap and negotiation realism.</div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Priority</th>
                  <th>Candidate</th>
                  <th>Status</th>
                  <th>Action</th>
                  <th class="num">Risk-Adj. Price</th>
                  <th class="num">Required Cut</th>
                  <th>Reason</th>
                </tr>
              </thead>
              <tbody>
                ${active.map((r, i) => `
                  <tr>
                    <td>${i + 1}</td>
                    <td><span class="candidate-title">${escapeHtml(safe(r.tower))}</span><br><span class="small-text">${escapeHtml(safe(r.unit_type))}</span></td>
                    <td>${pill(readinessLabel(r.readiness_status))}</td>
                    <td>${escapeHtml(dailyActionLabel(r.daily_action_category))}</td>
                    <td class="num">AED ${money(r.risk_adjusted_target_price_aed)}</td>
                    <td class="num">AED ${money(r.risk_adjusted_required_cut_aed)}<br><span class="small-text">${pct(r.risk_adjusted_required_cut_percent)}%</span></td>
                    <td>${escapeHtml(safe(r.evidence_gap_reason, "N/A"))}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderMacroPanel(rows, contextRows) {
      const context = getLatestContext(contextRows);
      const best = getBestWatch(rows);

      const fs = safe(context.financial_stability_score ?? best?.financial_stability_score, "N/A");
      const lei = safe(context.proxy_lei_score ?? best?.proxy_lei_score, "N/A");
      const confidence = safe(context.confidence_level ?? best?.macro_confidence, "MEDIUM");
      const quality = safe(context.data_quality_score ?? best?.macro_data_quality, "MEDIUM");
      const riskYield = best?.risk_adjusted_target_yield_percent || 6.75;

      const negative = num(fs) < 0 || num(lei) < 0;

      return `
        <section class="card">
          <h2>Market / Macro Overlay</h2>
          <div class="note">Macro affects entry discipline. It does not rescue weak property economics.</div>

          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Financial Stability</div>
              <div class="metric-value">${escapeHtml(fs)}</div>
              <div class="metric-small">Higher is better</div>
            </div>
            <div class="metric">
              <div class="metric-label">Proxy LEI</div>
              <div class="metric-value">${escapeHtml(lei)}</div>
              <div class="metric-small">Forward signal</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk Yield</div>
              <div class="metric-value">${pct(riskYield)}%</div>
              <div class="metric-small">Current hurdle</div>
            </div>
            <div class="metric">
              <div class="metric-label">Source Quality</div>
              <div class="metric-value">${escapeHtml(quality)}</div>
              <div class="metric-small">${escapeHtml(confidence)} confidence</div>
            </div>
          </div>

          <div class="banner ${negative ? "warn" : "good"}">
            <strong>Macro read:</strong>
            ${negative
              ? "Soft/negative. Require wider entry margin and do not chase median prices."
              : "Not negative. Still require property-level yield and evidence support."
            }
          </div>

          <details>
            <summary>View market pulse</summary>
            <div class="details-box">${escapeHtml(normalizeTextBlock(context.market_pulse_preview || context.market_pulse || context.macro_regime))}</div>
          </details>

          <details>
            <summary>View macro risk details</summary>
            <div class="details-box">${escapeHtml(normalizeTextBlock(context.risk_summary))}</div>
          </details>
        </section>
      `;
    }

    function renderBankPanel(rows, bankRows) {
      const bank = getLatestBank(bankRows, rows);
      const best = getBestWatch(rows);

      const rate = bank.benchmark_rate_percent || best?.bank_yield_percent || 3.5;
      const quality = bank.source_quality || best?.bank_source_quality || "HIGH";

      return `
        <section class="card">
          <h2>Bank Benchmark</h2>
          <div class="note">Used to test whether property IRR gives enough spread over low-risk AED cash return.</div>

          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Rate Used</div>
              <div class="metric-value">${pct(rate)}%</div>
              <div class="metric-small">AED term-deposit benchmark</div>
            </div>
            <div class="metric">
              <div class="metric-label">Source Quality</div>
              <div class="metric-value">${escapeHtml(quality)}</div>
              <div class="metric-small">${escapeHtml(safe(bank.confidence_level, quality))}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Target Spread</div>
              <div class="metric-value">3.00%</div>
              <div class="metric-small">Property IRR above bank</div>
            </div>
            <div class="metric">
              <div class="metric-label">Use</div>
              <div class="metric-value">IRR test</div>
              <div class="metric-small">Not yield substitute</div>
            </div>
          </div>

          <details>
            <summary>View bank source details</summary>
            <div class="details-box">Bank name: ${escapeHtml(safe(bank.bank_name, "HSBC UAE / UAE bank benchmark"))}
Rate used: ${pct(rate)}%
Status: ${escapeHtml(safe(bank.benchmark_rate_status, "N/A"))}
Usage: ${escapeHtml(safe(bank.calculation_usage_status, "N/A"))}
Notes: ${escapeHtml(safe(bank.source_notes || bank.bank_benchmark_source_note, "N/A"))}</div>
          </details>
        </section>
      `;
    }

    function renderWatchlist(rows) {
      const evidenceRows = sortByNetYield(getEvidenceRows(rows));

      if (!evidenceRows.length) {
        return `
          <section class="card">
            <h2>Price Target Watchlist</h2>
            <div class="banner bad">No evidence-based watchlist rows available.</div>
          </section>
        `;
      }

      return `
        <section class="card">
          <h2>Price Target Watchlist</h2>
          <div class="note">
            Ranked by net yield. The key commercial test is whether price can reach the risk-adjusted target.
          </div>

          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="Search tower or unit..." value="${escapeHtml(state.filters.search)}" />
            <select id="readinessSelect">
              <option value="ALL">All readiness</option>
              <option value="DECISION_READY">Decision-ready</option>
              <option value="INTERIM_SCREENED">Interim-screened</option>
              <option value="NEEDS_EVIDENCE">Needs evidence</option>
              <option value="BUDGET_MONITOR">Budget monitor</option>
            </select>
            <select id="realismSelect">
              <option value="ALL">All negotiation realism</option>
              <option value="REALISTIC">Realistic</option>
              <option value="POSSIBLE">Possible</option>
              <option value="DIFFICULT">Difficult</option>
              <option value="UNLIKELY">Unlikely</option>
            </select>
          </div>

          ${renderWatchlistTable(filteredRows(evidenceRows), true)}

          <details>
            <summary>Show explanation of watchlist logic</summary>
            <div class="details-box">Net yield ranks income attractiveness.

Risk-adjusted target price converts the required yield hurdle into an entry-price target.

Negotiation realism:
- Realistic: <=5% cut
- Possible: >5% to 10%
- Difficult: >10% to 20%
- Unlikely: >20%

A high-quality tower is not automatically a buy. The price still has to compensate for service charges, vacancy, entry/exit costs, bank alternative return and macro risk.</div>
          </details>
        </section>
      `;
    }

    function renderWatchlistTable(rows, includeEvidence) {
      if (!rows.length) {
        return `<div class="banner warn">No rows match the selected filters.</div>`;
      }

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Candidate</th>
                <th>Status</th>
                <th class="num">Price</th>
                <th class="num">Rent</th>
                <th class="num">Net Yield</th>
                <th class="num">IRR vs Bank</th>
                <th class="num">Risk Target Price</th>
                <th class="num">Required Cut</th>
                <th>Negotiation</th>
                <th>Action</th>
                ${includeEvidence ? "<th>Evidence</th>" : ""}
              </tr>
            </thead>
            <tbody>
              ${rows.map((r, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td><span class="candidate-title">${escapeHtml(safe(r.tower))}</span><br><span class="small-text">${escapeHtml(safe(r.unit_type))}</span></td>
                  <td>${pill(readinessLabel(r.readiness_status))}</td>
                  <td class="num">AED ${money(r.asking_price_aed)}</td>
                  <td class="num">AED ${money(r.estimated_annual_rent_aed)}</td>
                  <td class="num">${pct(r.net_yield_percent)}%</td>
                  <td class="num">${pct(r.irr_vs_bank_percent)}%</td>
                  <td class="num">AED ${money(r.risk_adjusted_target_price_aed)}</td>
                  <td class="num">AED ${money(r.risk_adjusted_required_cut_aed)}<br><span class="small-text">${pct(r.risk_adjusted_required_cut_percent)}%</span></td>
                  <td>${pill(safe(r.negotiation_realism), getNegotiationTone(r.negotiation_realism))}</td>
                  <td>${escapeHtml(dailyActionLabel(r.daily_action_category))}</td>
                  ${includeEvidence ? `
                    <td>
                      <details>
                        <summary>View</summary>
                        <div class="details-box">${escapeHtml(evidenceDetails(r))}</div>
                      </details>
                    </td>
                  ` : ""}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderEvidenceMap(rows) {
      const nonDealRows = rows.filter(r => r.readiness_status !== "DEAL_TEST");

      if (!nonDealRows.length) {
        return `
          <section class="card">
            <h2>Evidence Coverage & Data Actions</h2>
            <div class="banner">No rows available.</div>
          </section>
        `;
      }

      const order = {
        "DECISION_READY": 1,
        "INTERIM_SCREENED": 2,
        "NEEDS_EVIDENCE": 3,
        "BUDGET_MONITOR": 4
      };

      const sorted = [...nonDealRows].sort((a, b) => {
        const oa = order[a.readiness_status] || 99;
        const ob = order[b.readiness_status] || 99;
        if (oa !== ob) return oa - ob;
        return String(a.tower).localeCompare(String(b.tower));
      });

      return `
        <section class="card">
          <h2>Evidence Coverage & Data Actions</h2>
          <div class="note">
            This section explains what is missing and why the agent cannot make a final purchase decision.
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Candidate</th>
                  <th>Readiness</th>
                  <th>Missing / Issue</th>
                  <th>Why It Matters</th>
                  <th>Next Data Action</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.map(r => `
                  <tr>
                    <td><span class="candidate-title">${escapeHtml(safe(r.tower))}</span><br><span class="small-text">${escapeHtml(safe(r.unit_type))}</span></td>
                    <td>${pill(readinessLabel(r.readiness_status))}</td>
                    <td>${escapeHtml(safe(r.evidence_gap_reason, "N/A"))}</td>
                    <td>${escapeHtml(whyItMatters(r))}</td>
                    <td>${escapeHtml(safe(r.next_data_action, "N/A"))}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function whyItMatters(row) {
      const reason = String(row.evidence_gap_reason || "").toLowerCase();

      if (row.readiness_status === "INTERIM_SCREENED") {
        return "Good for screening, but not final action. Direct DLD/Ejari validation is still required before offer.";
      }

      if (reason.includes("rent")) {
        return "Without rent evidence, net yield and IRR cannot be trusted.";
      }

      if (reason.includes("sale")) {
        return "Without sale evidence, fair entry price and required discount cannot be trusted.";
      }

      if (row.readiness_status === "BUDGET_MONITOR") {
        return "The normal market level appears above the current AED 1.6m capital limit.";
      }

      return "Missing or weak evidence can distort yield, IRR, fair price and negotiation target.";
    }

    function renderDealTest(rows) {
      const dealRows = rows.filter(r => r.readiness_status === "DEAL_TEST");

      if (!dealRows.length) {
        return `
          <section class="card">
            <h2>Deal Test Scenario</h2>
            <div class="banner">No active deal-test scenario.</div>
          </section>
        `;
      }

      const r = dealRows[0];

      return `
        <section class="card">
          <h2>Deal Test Scenario</h2>
          <div class="note">Scenario only. Do not treat as validated candidate unless promoted through evidence workflow.</div>

          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Scenario</div>
              <div class="metric-value">${escapeHtml(safe(r.tower))}</div>
              <div class="metric-small">${escapeHtml(safe(r.unit_type))}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Net Yield</div>
              <div class="metric-value">${pct(r.net_yield_percent)}%</div>
              <div class="metric-small">Scenario yield</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk Target Price</div>
              <div class="metric-value">AED ${money(r.risk_adjusted_target_price_aed)}</div>
              <div class="metric-small">Current macro hurdle</div>
            </div>
            <div class="metric">
              <div class="metric-label">Required Cut</div>
              <div class="metric-value">AED ${money(r.risk_adjusted_required_cut_aed)}</div>
              <div class="metric-small">${pct(r.risk_adjusted_required_cut_percent)}%</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderFullTechnicalAudit(rows, contextRows, bankRows) {
      return `
        <section class="card">
          <h2>Technical Audit</h2>
          <div class="note">Collapsed by default. Use for model QA, evidence checking or pipeline troubleshooting.</div>

          <details>
            <summary>Readiness rules</summary>
            <div class="details-box">Decision-ready = strict / high-confidence direct evidence.

Interim-screened = enough for screening and watchlist, not enough for final offer.

Needs evidence = missing sale or rent evidence.

Budget monitor = normal evidence suggests price is above AED 1.6m budget cap; monitor only for distressed / below-market cases.

Deal test = scenario only.</div>
          </details>

          <details>
            <summary>Raw watchlist view rows</summary>
            <div class="details-box">${escapeHtml(JSON.stringify(rows, null, 2))}</div>
          </details>

          <details>
            <summary>Raw macro context</summary>
            <div class="details-box">${escapeHtml(JSON.stringify(contextRows[0] || {}, null, 2))}</div>
          </details>

          <details>
            <summary>Raw bank context</summary>
            <div class="details-box">${escapeHtml(JSON.stringify(bankRows[0] || {}, null, 2))}</div>
          </details>
        </section>
      `;
    }

    function renderDashboard() {
      const rows = state.rows;
      const contextRows = state.contextRows;
      const bankRows = state.bankRows;

      document.getElementById("app").innerHTML = `
        ${renderExecutiveDecision(rows, contextRows, bankRows)}

        <div class="layout-three">
          ${renderAdvisorActionPanel(rows)}
          ${renderMacroPanel(rows, contextRows)}
          ${renderBankPanel(rows, bankRows)}
        </div>

        ${renderWatchlist(rows)}

        ${renderEvidenceMap(rows)}

        ${renderDealTest(rows)}

        ${renderFullTechnicalAudit(rows, contextRows, bankRows)}
      `;

      attachFilterEvents();
    }

    function attachFilterEvents() {
      const searchInput = document.getElementById("searchInput");
      const readinessSelect = document.getElementById("readinessSelect");
      const realismSelect = document.getElementById("realismSelect");

      if (searchInput) {
        searchInput.addEventListener("input", (e) => {
          state.filters.search = e.target.value;
          renderDashboard();
        });
      }

      if (readinessSelect) {
        readinessSelect.value = state.filters.readiness;
        readinessSelect.addEventListener("change", (e) => {
          state.filters.readiness = e.target.value;
          renderDashboard();
        });
      }

      if (realismSelect) {
        realismSelect.value = state.filters.realism;
        realismSelect.addEventListener("change", (e) => {
          state.filters.realism = e.target.value;
          renderDashboard();
        });
      }
    }

    async function loadDashboard() {
      const app = document.getElementById("app");

      try {
        const watchlistRows = await restGet(
          VIEW_WATCHLIST,
          "select=*&order=created_at.desc"
        );

        if (!Array.isArray(watchlistRows) || watchlistRows.length === 0) {
          app.innerHTML = `
            <section class="card">
              <h2>No Data</h2>
              <div class="banner warn">
                No rows returned from <code>${VIEW_WATCHLIST}</code>.
                Run the full n8n workflow and verify the Supabase view.
              </div>
            </section>
          `;
          return;
        }

        const latestRunId = watchlistRows[0].run_id;

        let contextRows = [];
        let bankRows = [];

        try {
          contextRows = await restGet(
            TABLE_AGENT_CONTEXT,
            `select=*&run_id=eq.${encodeURIComponent(latestRunId)}&order=created_at.desc&limit=1`
          );
        } catch (error) {
          contextRows = [];
        }

        try {
          bankRows = await restGet(
            TABLE_BANK_CONTEXT,
            `select=*&run_id=eq.${encodeURIComponent(latestRunId)}&order=created_at.desc&limit=1`
          );
        } catch (error) {
          bankRows = [];
        }

        if (!contextRows.length) {
          try {
            contextRows = await restGet(TABLE_AGENT_CONTEXT, "select=*&order=created_at.desc&limit=1");
          } catch (error) {
            contextRows = [];
          }
        }

        if (!bankRows.length) {
          try {
            bankRows = await restGet(TABLE_BANK_CONTEXT, "select=*&order=created_at.desc&limit=1");
          } catch (error) {
            bankRows = [];
          }
        }

        state.rows = watchlistRows;
        state.contextRows = contextRows;
        state.bankRows = bankRows;

        renderDashboard();

      } catch (error) {
        app.innerHTML = `
          <section class="card">
            <h2>Load Error</h2>
            <div class="banner bad">
              ${escapeHtml(error.message || "Unknown JavaScript or REST error.")}
            </div>
            <div class="note">
              Check that <code>${VIEW_WATCHLIST}</code> exists, is exposed via REST,
              and that anon/publishable-key SELECT access is allowed.
            </div>
          </section>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>

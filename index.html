<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JLT Investment Agent</title>

  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #16202a;
      --muted: #65717f;
      --border: #dde3ea;
      --blue: #1f5fbf;
      --green: #0b7a3b;
      --amber: #b26a00;
      --red: #a12626;
      --soft-blue: #eef4ff;
      --soft-green: #eefaf2;
      --soft-amber: #fff6e5;
      --soft-red: #fff0f0;
      --shadow: 0 8px 22px rgba(0, 0, 0, 0.055);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .container {
      max-width: 1420px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    code {
      background: #eef1f4;
      padding: 2px 5px;
      border-radius: 6px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 18px;
    }

    .decision-card {
      border-left: 7px solid var(--red);
    }

    .decision-card.watch {
      border-left-color: var(--amber);
    }

    .decision-card.buy {
      border-left-color: var(--green);
    }

    .layout-two {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
      margin-top: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .grid-four {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .metric {
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 86px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric-value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 700;
    }

    .metric-small {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    .decision-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .decision-subtitle {
      font-size: 16px;
      color: var(--muted);
    }

    .banner {
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: #fafbfc;
    }

    .banner.good {
      background: var(--soft-green);
      border-color: #b7e5c7;
    }

    .banner.warn {
      background: var(--soft-amber);
      border-color: #ffd38a;
    }

    .banner.bad {
      background: var(--soft-red);
      border-color: #ffb4b4;
    }

    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #f8f9fa;
      white-space: nowrap;
    }

    .pill.good {
      color: var(--green);
      background: var(--soft-green);
      border-color: #b7e5c7;
    }

    .pill.warn {
      color: var(--amber);
      background: var(--soft-amber);
      border-color: #ffd38a;
    }

    .pill.bad {
      color: var(--red);
      background: var(--soft-red);
      border-color: #ffb4b4;
    }

    .pill.blue {
      color: var(--blue);
      background: var(--soft-blue);
      border-color: #bdd3ff;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f1f4f7;
      color: #2d3748;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.035em;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .num {
      text-align: right;
      white-space: nowrap;
    }

    details {
      cursor: pointer;
      margin-top: 10px;
    }

    summary {
      color: var(--blue);
      font-weight: 700;
      font-size: 13px;
    }

    .details-box {
      margin-top: 8px;
      color: var(--muted);
      max-width: 1050px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }

    .small-text {
      font-size: 12px;
      color: var(--muted);
    }

    .loading {
      padding: 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cfd6df;
      border-top: 2px solid var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 8px;
      vertical-align: -2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1100px) {
      .layout-two {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }

      .grid-four {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }
    }

    @media (max-width: 650px) {
      .container {
        padding: 14px;
      }

      .grid,
      .grid-four {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }

      .decision-title {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>JLT Investment Agent</h1>
      <div class="subtitle">Macro-aware, finance-driven JLT ready-apartment screening</div>
    </header>

    <div id="app" class="loading">
      <span class="spinner"></span>Loading latest run...
    </div>
  </div>

  <script>
    const SUPABASE_REST_URL = "https://cndyxfprqpfkzypxhrxl.supabase.co/rest/v1";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_VOIytNYEBG7FyZzQqqW66w_nJWK37TC";

    const VIEW_CLASSIFICATION = "dashboard_latest_candidate_classification";
    const TABLE_AGENT_CONTEXT = "agent_run_context";
    const TABLE_BANK_CONTEXT = "bank_benchmark_context";

    const BASE_STRONG_BUY_YIELD = 6.5;
    const SOFT_MACRO_TARGET_YIELD = 6.75;
    const BANK_SPREAD_TARGET = 3.0;
    const BUDGET_CAP_AED = 1600000;

    const AED = new Intl.NumberFormat("en-AE", { maximumFractionDigits: 0 });
    const NUM = new Intl.NumberFormat("en-AE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function safe(v, fallback = "") {
      return v === null || v === undefined || v === "" ? fallback : v;
    }

    function money(v) {
      const n = Number(v || 0);
      return n === 0 ? "0" : AED.format(n);
    }

    function pct(v) {
      return NUM.format(Number(v || 0));
    }

    function dateTime(v) {
      if (!v) return "N/A";
      try {
        return new Date(v).toLocaleString();
      } catch {
        return v;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pill(text) {
      const t = String(text || "").toUpperCase();

      if (t.includes("BUY")) return `<span class="pill good">${escapeHtml(text)}</span>`;
      if (t.includes("WATCH")) return `<span class="pill warn">${escapeHtml(text)}</span>`;
      if (t.includes("SCREENED")) return `<span class="pill warn">${escapeHtml(text)}</span>`;
      if (t.includes("MONITOR")) return `<span class="pill blue">${escapeHtml(text)}</span>`;
      if (t.includes("NEEDS")) return `<span class="pill bad">${escapeHtml(text)}</span>`;
      if (t.includes("DATA")) return `<span class="pill bad">${escapeHtml(text)}</span>`;
      if (t.includes("DEAL")) return `<span class="pill blue">${escapeHtml(text)}</span>`;
      if (t.includes("PASS")) return `<span class="pill bad">${escapeHtml(text)}</span>`;

      return `<span class="pill">${escapeHtml(safe(text, "N/A"))}</span>`;
    }

    function normalizeTextBlock(text) {
      const s = String(text || "").trim();
      if (!s) return "No text available.";
      return s;
    }

    function sortByNetYieldDesc(rows) {
      return [...rows].sort((a, b) => Number(b.net_yield_percent || 0) - Number(a.net_yield_percent || 0));
    }

    function sortByRequiredCutAsc(rows) {
      return [...rows].sort((a, b) => Number(a.discount_to_6_5_target_percent || 999) - Number(b.discount_to_6_5_target_percent || 999));
    }

    function classifyRows(rows) {
      return {
        strictRows: rows.filter(r => r.dashboard_bucket === "STRICT_EVIDENCE"),
        interimRows: rows.filter(r => r.dashboard_bucket === "INTERIM_EVIDENCE"),
        gapRows: rows.filter(r => r.dashboard_bucket === "DATA_GAP"),
        dealRows: rows.filter(r => r.dashboard_bucket === "DEAL_TEST"),
        reviewRows: rows.filter(r => r.dashboard_bucket === "REVIEW_REQUIRED")
      };
    }

    function rowName(row) {
      return `${safe(row.tower)} ${safe(row.unit_type)}`;
    }

    function getBest(rows) {
      if (!rows.length) return null;
      return sortByNetYieldDesc(rows)[0];
    }

    function getMacroTargetYield(contextRows) {
      const c = contextRows[0] || {};
      const fs = Number(c.financial_stability_score);
      const lei = Number(c.proxy_lei_score);

      if (fs < 0 || lei < 0) return SOFT_MACRO_TARGET_YIELD;
      return BASE_STRONG_BUY_YIELD;
    }

    function calculateRiskAdjustedTargetPrice(row, targetYieldPercent) {
      const strongBuyPrice = Number(row.strong_buy_price_aed || 0);
      if (!strongBuyPrice || !targetYieldPercent) return 0;

      return strongBuyPrice * (BASE_STRONG_BUY_YIELD / targetYieldPercent);
    }

    function negotiationRealism(row) {
      const cut = Number(row.discount_to_6_5_target_percent || 0);

      if (cut <= 0) return { label: "At target", className: "good", note: "Already at or below strong-buy target." };
      if (cut <= 5) return { label: "Realistic", className: "good", note: "Small discount required. Worth active negotiation if evidence is sound." };
      if (cut <= 10) return { label: "Possible", className: "warn", note: "Requires motivated seller or negotiation leverage." };
      if (cut <= 20) return { label: "Difficult", className: "warn", note: "Meaningful discount required. Track but avoid chasing." };
      return { label: "Unlikely", className: "bad", note: "Discount likely unrealistic unless distress or special situation exists." };
    }

    function displayDecisionLabel(row) {
      const raw = String(row.final_decision || "").toUpperCase();

      if (raw === "INTERIM PASS") return "INTERIM SCREENED";
      if (raw === "INTERIM WATCH") return "NEGOTIATE WATCH";
      if (raw === "INTERIM BUY CANDIDATE") return "INTERIM BUY CANDIDATE";
      if (raw === "DATA GAP") return getReadinessLabel(row);
      if (raw === "DEAL TEST ONLY") return "DEAL TEST";
      if (raw === "OUT OF BUDGET") return "BUDGET MONITOR";

      return row.final_decision || "N/A";
    }

    function getReadinessLabel(row) {
      const reason = getMissingDataReason(row).toLowerCase();

      if (reason.includes("above budget") || reason.includes("budget")) return "BUDGET MONITOR";
      return "NEEDS EVIDENCE";
    }

    function getMissingDataReason(row) {
      const tower = String(row.tower || "");
      const unit = String(row.unit_type || "");

      const priceNote = String(row.price_source_note || "");
      const rentNote = String(row.rent_source_note || "");
      const combined = `${priceNote} ${rentNote}`.toLowerCase();

      if (tower === "Goldcrest Views 2" && unit === "1BR") {
        return "Rent evidence missing. Sale evidence exists in staging, but usable annual rent evidence was not available or partial/outlier only.";
      }

      if (tower === "Madina Tower" && unit === "2BR") {
        return "Sale evidence missing. Rent evidence exists, but no traceable 2026 2BR sale evidence is available for valuation.";
      }

      if (tower.startsWith("Green Lakes") && unit === "2BR") {
        return "Median sale evidence is above AED 1.6m budget cap. Track only if a distressed or unusually low transaction/listing appears.";
      }

      if (combined.includes("above aed 1.6m") || combined.includes("above budget")) {
        return "Evidence suggests price is above AED 1.6m budget cap. Track only if a below-budget opportunity appears.";
      }

      if (Number(row.asking_price_aed || 0) === 0 && Number(row.estimated_annual_rent_aed || 0) === 0) {
        return "Sale/rent evidence is not decision-ready. Add trusted transaction and rental evidence before valuation.";
      }

      return "Evidence is incomplete. Add missing trusted sale/rent evidence before valuation.";
    }

    function getWhyItMatters(row) {
      const reason = getMissingDataReason(row).toLowerCase();

      if (reason.includes("rent evidence")) {
        return "Without annual rent evidence, net yield and IRR cannot be trusted.";
      }

      if (reason.includes("sale evidence")) {
        return "Without sale evidence, fair entry price cannot be confirmed.";
      }

      if (reason.includes("budget")) {
        return "The unit type may be attractive, but the normal market price is above the current capital limit.";
      }

      return "Missing evidence can distort yield, IRR, target price and buy/watch/pass logic.";
    }

    function getNextDataAction(row) {
      const reason = getMissingDataReason(row).toLowerCase();

      if (reason.includes("rent evidence")) {
        return "Find 2026 annual rent transactions from Property Finder DLD-derived rent page or direct Ejari/DLD source.";
      }

      if (reason.includes("sale evidence")) {
        return "Find traceable 2026 sale transaction for the same tower/unit type, preferably DLD or Property Finder DLD-derived.";
      }

      if (reason.includes("budget")) {
        return "Do not value as normal candidate. Monitor listings/transactions only below AED 1.6m or near target buy price.";
      }

      return "Add sale and rent evidence, then promote through the evidence register.";
    }

    function getEvidenceCoverage(row) {
      const bucket = String(row.dashboard_bucket || "");
      const sourceType = String(row.input_source_type || "");
      const confidence = String(row.input_data_confidence || "");

      if (bucket === "STRICT_EVIDENCE") {
        return {
          sale: "YES",
          rent: "YES",
          serviceCharge: "YES",
          readiness: "Decision-ready",
          note: "Strict high-confidence evidence row."
        };
      }

      if (bucket === "INTERIM_EVIDENCE") {
        return {
          sale: "YES",
          rent: "YES",
          serviceCharge: "YES",
          readiness: "Interim-screened",
          note: `Uses ${sourceType}; confidence ${confidence}. Validate with direct DLD/Ejari before action.`
        };
      }

      const reason = getMissingDataReason(row);

      if (reason.toLowerCase().includes("rent evidence missing")) {
        return {
          sale: "YES",
          rent: "NO",
          serviceCharge: Number(row.service_charge_aed_sqft_year || 0) > 0 ? "YES" : "NO",
          readiness: "Needs evidence",
          note: reason
        };
      }

      if (reason.toLowerCase().includes("sale evidence missing")) {
        return {
          sale: "NO",
          rent: "YES",
          serviceCharge: Number(row.service_charge_aed_sqft_year || 0) > 0 ? "YES" : "NO",
          readiness: "Needs evidence",
          note: reason
        };
      }

      if (reason.toLowerCase().includes("budget")) {
        return {
          sale: "YES",
          rent: "YES",
          serviceCharge: Number(row.service_charge_aed_sqft_year || 0) > 0 ? "YES" : "NO",
          readiness: "Budget monitor",
          note: reason
        };
      }

      return {
        sale: "NO",
        rent: "NO",
        serviceCharge: Number(row.service_charge_aed_sqft_year || 0) > 0 ? "YES" : "NO",
        readiness: "Needs evidence",
        note: reason
      };
    }

    function sourceDetails(row) {
      return [
        `Price source: ${safe(row.price_source_note, "N/A")}`,
        `Rent source: ${safe(row.rent_source_note, "N/A")}`,
        `Service charge source: ${safe(row.service_charge_source_note, "N/A")}`,
        `Bank benchmark: ${safe(row.bank_benchmark_source_note, "N/A")}`,
        `Bucket: ${safe(row.dashboard_bucket, "N/A")}`,
        `Bucket note: ${safe(row.dashboard_bucket_note, "N/A")}`,
        `Decision reason: ${safe(row.decision_reason, "N/A")}`,
        `Dashboard label: ${displayDecisionLabel(row)}`,
        `Technical verdict: ${safe(row.final_decision, "N/A")}`
      ].join("\n\n");
    }

    async function fetchWithTimeout(url, options, timeoutMs = 15000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeout);
        return response;
      } catch (error) {
        clearTimeout(timeout);
        throw error;
      }
    }

    async function restGet(path, query = "select=*") {
      const url = `${SUPABASE_REST_URL}/${path}?${query}`;

      const response = await fetchWithTimeout(url, {
        method: "GET",
        headers: {
          "apikey": SUPABASE_PUBLISHABLE_KEY,
          "Authorization": `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
          "Accept": "application/json"
        }
      });

      const text = await response.text();

      if (!response.ok) {
        throw new Error(`REST ${path} failed: ${response.status} ${text}`);
      }

      try {
        return JSON.parse(text);
      } catch {
        throw new Error(`REST ${path} returned non-JSON response: ${text}`);
      }
    }

    function renderExecutiveDecision(rows, contextRows, bankRows) {
      const { strictRows, interimRows, gapRows, dealRows } = classifyRows(rows);
      const evidenceRows = [...strictRows, ...interimRows];
      const best = getBest(evidenceRows);
      const latestRun = rows.length ? rows[0].run_id : "N/A";
      const latestTime = rows.length ? rows[0].created_at : null;

      const buyLike = evidenceRows.filter(r => String(r.final_decision || "").includes("BUY"));
      const decisionClass = buyLike.length ? "buy" : "watch";

      const latestContext = contextRows[0] || {};
      const latestBank = bankRows[0] || rows.find(r => r.bank_yield_percent !== null) || {};

      const financialStability = safe(latestContext.financial_stability_score, "N/A");
      const proxyLei = safe(latestContext.proxy_lei_score, "N/A");
      const macroConfidence = safe(latestContext.confidence_level, "MEDIUM");
      const bankRate = latestBank.benchmark_rate_percent || best?.bank_yield_percent || 3.5;
      const bankQuality = latestBank.source_quality || best?.bank_source_quality || "HIGH";
      const riskTargetYield = getMacroTargetYield(contextRows);
      const riskAdjustedTargetPrice = best ? calculateRiskAdjustedTargetPrice(best, riskTargetYield) : 0;

      return `
        <section class="card decision-card ${decisionClass}">
          <div class="decision-title">${buyLike.length ? "Buy gate triggered — validate before action" : "Do not buy now"}</div>
          <div class="decision-subtitle">
            ${best
              ? `Best current watch item is <strong>${escapeHtml(rowName(best))}</strong>. It is below the risk-adjusted buy threshold.`
              : `No evidence-based candidate is available yet.`
            }
          </div>

          <div class="grid">
            <div class="metric">
              <div class="metric-label">Best Watch Item</div>
              <div class="metric-value">${best ? escapeHtml(rowName(best)) : "None"}</div>
              <div class="metric-small">${best ? escapeHtml(displayDecisionLabel(best)) : "N/A"}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Best Net Yield</div>
              <div class="metric-value">${best ? pct(best.net_yield_percent) + "%" : "N/A"}</div>
              <div class="metric-small">Base trigger: ${pct(BASE_STRONG_BUY_YIELD)}%</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk-Adjusted Trigger</div>
              <div class="metric-value">${pct(riskTargetYield)}%</div>
              <div class="metric-small">Macro-adjusted target</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk-Adjusted Price</div>
              <div class="metric-value">AED ${best ? money(riskAdjustedTargetPrice) : "N/A"}</div>
              <div class="metric-small">Target entry under current macro</div>
            </div>
            <div class="metric">
              <div class="metric-label">Macro Overlay</div>
              <div class="metric-value">FS ${escapeHtml(financialStability)} / LEI ${escapeHtml(proxyLei)}</div>
              <div class="metric-small">${escapeHtml(macroConfidence)} confidence</div>
            </div>
            <div class="metric">
              <div class="metric-label">Bank Benchmark</div>
              <div class="metric-value">${pct(bankRate)}%</div>
              <div class="metric-small">${escapeHtml(bankQuality)}</div>
            </div>
          </div>

          <div class="banner warn">
            <strong>Decision discipline:</strong>
            No current candidate meets the buy gate at current median transaction economics.
            The dashboard should be used for watchlist monitoring, evidence gap closure and target-price negotiation.
          </div>

          <div class="note">
            Loaded run <strong>${escapeHtml(latestRun)}</strong> at ${dateTime(latestTime)}.
            Strict evidence: <strong>${strictRows.length}</strong>.
            Interim evidence: <strong>${interimRows.length}</strong>.
            Needs evidence / budget monitor: <strong>${gapRows.length}</strong>.
            Deal tests: <strong>${dealRows.length}</strong>.
          </div>
        </section>
      `;
    }

    function renderMacroOverlay(contextRows, rows) {
      const c = contextRows[0] || {};
      const { strictRows, interimRows, gapRows, dealRows } = classifyRows(rows);

      const financialStability = safe(c.financial_stability_score, "N/A");
      const proxyLei = safe(c.proxy_lei_score, "N/A");
      const confidence = safe(c.confidence_level, "MEDIUM");
      const quality = safe(c.data_quality_score, "MEDIUM");
      const riskTargetYield = getMacroTargetYield(contextRows);

      const currentRiskSummary =
        `Macro context is live-connected and should be treated as an overlay only. ` +
        `Latest run has ${strictRows.length} strict direct-DLD/Ejari evidence candidate(s), ` +
        `${interimRows.length} interim evidence candidate(s), ${gapRows.length} row(s) needing evidence or budget monitoring, ` +
        `and ${dealRows.length} deal-test row(s). ` +
        `Interim evidence is suitable for screening and negotiation target setting, but not final purchase action until reconciled with direct DLD/Ejari or equivalent primary evidence.`;

      const currentPropertyStatus =
        `Property sale evidence status: ${strictRows.length} strict/direct evidence row(s), ` +
        `${interimRows.length} Property Finder DLD-derived interim row(s), ` +
        `${gapRows.length} row(s) still needing evidence or budget monitoring. ` +
        `Public direct-DLD transaction engine is not yet connected.`;

      const currentRentalStatus =
        `Rental evidence status: ${strictRows.length} strict/direct evidence row(s), ` +
        `${interimRows.length} Property Finder DLD-derived interim row(s), ` +
        `${gapRows.length} row(s) still needing evidence or budget monitoring. ` +
        `Direct Ejari/DLD rental feed is not yet connected.`;

      return `
        <section class="card">
          <h2>Market / Macro Risk Overlay</h2>
          <div class="note">
            Macro should change entry discipline, not override weak property economics.
          </div>

          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Financial Stability</div>
              <div class="metric-value">${escapeHtml(financialStability)}</div>
              <div class="metric-small">Higher is better</div>
            </div>
            <div class="metric">
              <div class="metric-label">Proxy LEI</div>
              <div class="metric-value">${escapeHtml(proxyLei)}</div>
              <div class="metric-small">Forward indicator signal</div>
            </div>
            <div class="metric">
              <div class="metric-label">Risk-Adjusted Yield</div>
              <div class="metric-value">${pct(riskTargetYield)}%</div>
              <div class="metric-small">Entry hurdle under current macro</div>
            </div>
            <div class="metric">
              <div class="metric-label">Macro Quality</div>
              <div class="metric-value">${escapeHtml(quality)}</div>
              <div class="metric-small">${escapeHtml(confidence)} confidence</div>
            </div>
          </div>

          <div class="banner ${Number(financialStability) < 0 || Number(proxyLei) < 0 ? "warn" : "good"}">
            <strong>Current read:</strong>
            ${Number(financialStability) < 0 || Number(proxyLei) < 0
              ? "Macro overlay is soft/negative. Apply stricter entry pricing and avoid chasing median-market deals."
              : "Macro overlay is not negative. Still rely on property-level yield, IRR spread and evidence quality."
            }
          </div>

          <details>
            <summary>View market pulse</summary>
            <div class="details-box">${escapeHtml(normalizeTextBlock(c.market_pulse_preview || c.market_pulse || c.macro_regime))}</div>
          </details>

          <details>
            <summary>View current risk summary</summary>
            <div class="details-box">${escapeHtml(currentRiskSummary)}</div>
          </details>

          <details>
            <summary>View current property / rental data status</summary>
            <div class="details-box">Property data: ${escapeHtml(currentPropertyStatus)}

Rental data: ${escapeHtml(currentRentalStatus)}

Macro data: ${escapeHtml(safe(c.macro_data_status, "Live macro context connected via Perplexity/S&P Global PMI where available. Source coverage depends on returned allowed-domain results."))}</div>
          </details>

          <details>
            <summary>View old stored macro-context text</summary>
            <div class="details-box">${escapeHtml(normalizeTextBlock(c.risk_summary))}</div>
          </details>
        </section>
      `;
    }

    function renderDealTest(rows) {
      const { dealRows } = classifyRows(rows);

      if (!dealRows.length) {
        return `
          <section class="card">
            <h2>Deal Test Scenario</h2>
            <div class="banner">No active deal-test rows.</div>
          </section>
        `;
      }

      const r = sortByNetYieldDesc(dealRows)[0];

      return `
        <section class="card">
          <h2>Deal Test Scenario</h2>
          <div class="note">Scenario only. Not a validated candidate unless promoted through evidence workflow.</div>

          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Scenario</div>
              <div class="metric-value">${escapeHtml(safe(r.tower))}</div>
              <div class="metric-small">${escapeHtml(safe(r.unit_type))}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Net Yield</div>
              <div class="metric-value">${pct(r.net_yield_percent)}%</div>
              <div class="metric-small">Scenario yield</div>
            </div>
            <div class="metric">
              <div class="metric-label">Strong-Buy Price</div>
              <div class="metric-value">AED ${money(r.strong_buy_price_aed)}</div>
              <div class="metric-small">6.5% net-yield target</div>
            </div>
            <div class="metric">
              <div class="metric-label">Required Cut</div>
              <div class="metric-value">AED ${money(r.discount_to_6_5_target_aed)}</div>
              <div class="metric-small">${pct(r.discount_to_6_5_target_percent)}%</div>
            </div>
          </div>

          <details>
            <summary>Show deal-test details</summary>
            ${renderFullEvidenceTable(dealRows)}
          </details>
        </section>
      `;
    }

    function renderWatchlist(rows, contextRows) {
      const { interimRows, strictRows } = classifyRows(rows);
      const evidenceRows = sortByNetYieldDesc([...strictRows, ...interimRows]);
      const topRows = evidenceRows.slice(0, 7);
      const riskTargetYield = getMacroTargetYield(contextRows);

      if (!topRows.length) {
        return `
          <section class="card">
            <h2>Price Target Watchlist</h2>
            <div class="banner bad">No evidence-based rows available.</div>
          </section>
        `;
      }

      return `
        <section class="card">
          <h2>Price Target Watchlist</h2>
          <div class="note">
            Ranked by net yield. Risk-adjusted target yield is ${pct(riskTargetYield)}% under current macro overlay.
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Candidate</th>
                  <th class="num">Current Price</th>
                  <th class="num">Rent</th>
                  <th class="num">Net Yield</th>
                  <th class="num">IRR vs Bank</th>
                  <th class="num">6.5% Target Price</th>
                  <th class="num">Risk-Adj. Price</th>
                  <th class="num">Required Cut</th>
                  <th>Negotiation</th>
                  <th>Decision</th>
                  <th>Evidence</th>
                </tr>
              </thead>
              <tbody>
                ${topRows.map((r, i) => {
                  const realism = negotiationRealism(r);
                  const riskPrice = calculateRiskAdjustedTargetPrice(r, riskTargetYield);

                  return `
                    <tr>
                      <td>${i + 1}</td>
                      <td><strong>${escapeHtml(safe(r.tower))}</strong><br><span class="note">${escapeHtml(safe(r.unit_type))}</span></td>
                      <td class="num">AED ${money(r.asking_price_aed)}</td>
                      <td class="num">AED ${money(r.estimated_annual_rent_aed)}</td>
                      <td class="num">${pct(r.net_yield_percent)}%</td>
                      <td class="num">${pct(r.irr_vs_bank_percent)}%</td>
                      <td class="num">AED ${money(r.strong_buy_price_aed)}</td>
                      <td class="num">AED ${money(riskPrice)}</td>
                      <td class="num">AED ${money(r.discount_to_6_5_target_aed)}<br><span class="small-text">${pct(r.discount_to_6_5_target_percent)}%</span></td>
                      <td>${pill(realism.label)}<br><span class="small-text">${escapeHtml(realism.note)}</span></td>
                      <td>${pill(displayDecisionLabel(r))}</td>
                      <td>
                        <details>
                          <summary>View</summary>
                          <div class="details-box">${escapeHtml(sourceDetails(r))}</div>
                        </details>
                      </td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>

          <details>
            <summary>Show full evidence-based table</summary>
            ${renderFullEvidenceTable(evidenceRows)}
          </details>
        </section>
      `;
    }

    function renderEvidenceCoverageMap(rows) {
      const { gapRows, interimRows, strictRows } = classifyRows(rows);
      const all = [...strictRows, ...interimRows, ...gapRows];

      if (!all.length) {
        return `
          <section class="card">
            <h2>Evidence Coverage Map</h2>
            <div class="banner">No rows available.</div>
          </section>
        `;
      }

      const sorted = [...all].sort((a, b) => {
        const ca = getEvidenceCoverage(a);
        const cb = getEvidenceCoverage(b);
        return ca.readiness.localeCompare(cb.readiness) || String(a.tower).localeCompare(String(b.tower));
      });

      return `
        <section class="card">
          <h2>Evidence Coverage Map</h2>
          <div class="note">
            Shows what is available, what is missing, why it matters, and the next data action. This replaces “exclusion” wording.
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Candidate</th>
                  <th>Readiness</th>
                  <th>Sale</th>
                  <th>Rent</th>
                  <th>Service Charge</th>
                  <th>What Is Missing / Issue</th>
                  <th>Why It Matters</th>
                  <th>Next Data Action</th>
                </tr>
              </thead>
              <tbody>
                ${sorted.map(r => {
                  const c = getEvidenceCoverage(r);

                  return `
                    <tr>
                      <td><strong>${escapeHtml(safe(r.tower))}</strong><br><span class="note">${escapeHtml(safe(r.unit_type))}</span></td>
                      <td>${pill(c.readiness)}</td>
                      <td>${c.sale === "YES" ? pill("YES") : pill("NO")}</td>
                      <td>${c.rent === "YES" ? pill("YES") : pill("NO")}</td>
                      <td>${c.serviceCharge === "YES" ? pill("YES") : pill("NO")}</td>
                      <td>${escapeHtml(c.note)}</td>
                      <td>${escapeHtml(getWhyItMatters(r))}</td>
                      <td>${escapeHtml(getNextDataAction(r))}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderFullEvidenceTable(rows) {
      if (!rows.length) return `<div class="banner">No rows.</div>`;

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Candidate</th>
                <th class="num">Price</th>
                <th class="num">Area</th>
                <th class="num">Rent</th>
                <th class="num">SC</th>
                <th class="num">Net Yield</th>
                <th class="num">5Y IRR</th>
                <th class="num">Required Cut</th>
                <th>Verdict</th>
                <th>Confidence</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${escapeHtml(safe(r.tower))} ${escapeHtml(safe(r.unit_type))}</td>
                  <td class="num">AED ${money(r.asking_price_aed)}</td>
                  <td class="num">${money(r.area_sqft)}</td>
                  <td class="num">AED ${money(r.estimated_annual_rent_aed)}</td>
                  <td class="num">${pct(r.service_charge_aed_sqft_year)}</td>
                  <td class="num">${pct(r.net_yield_percent)}%</td>
                  <td class="num">${pct(r.irr_5y_percent)}%</td>
                  <td class="num">AED ${money(r.discount_to_6_5_target_aed)}</td>
                  <td>${pill(displayDecisionLabel(r))}</td>
                  <td>${escapeHtml(safe(r.input_data_confidence))}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDataQuality(rows, bankRows) {
      const { strictRows, interimRows, gapRows, dealRows } = classifyRows(rows);
      const latestBank = bankRows[0] || {};
      const bankRate = latestBank.benchmark_rate_percent || rows[0]?.bank_yield_percent || 3.5;
      const bankQuality = latestBank.source_quality || rows[0]?.bank_source_quality || "HIGH";

      return `
        <section class="card">
          <h2>Data Quality Status</h2>
          <div class="grid-four">
            <div class="metric">
              <div class="metric-label">Strict Evidence</div>
              <div class="metric-value">${strictRows.length}</div>
              <div class="metric-small">Direct DLD/Ejari/HIGH only</div>
            </div>
            <div class="metric">
              <div class="metric-label">Interim Screened</div>
              <div class="metric-value">${interimRows.length}</div>
              <div class="metric-small">DLD-derived screening</div>
            </div>
            <div class="metric">
              <div class="metric-label">Needs Evidence / Monitor</div>
              <div class="metric-value">${gapRows.length}</div>
              <div class="metric-small">Not decision-ready</div>
            </div>
            <div class="metric">
              <div class="metric-label">Bank Benchmark</div>
              <div class="metric-value">${pct(bankRate)}%</div>
              <div class="metric-small">${escapeHtml(bankQuality)}</div>
            </div>
          </div>

          <div class="banner warn">
            <strong>Reliability note:</strong>
            Interim evidence is suitable for screening and negotiation target setting.
            It is not final purchase evidence until reconciled against direct DLD/Ejari or equivalent primary source.
          </div>

          <details>
            <summary>Show bank benchmark details</summary>
            <div class="details-box">Bank name: ${escapeHtml(safe(latestBank.bank_name, "HSBC UAE / UAE bank benchmark"))}
Rate used: ${pct(bankRate)}%
Confidence: ${escapeHtml(safe(latestBank.confidence_level || bankQuality, "N/A"))}
Status: ${escapeHtml(safe(latestBank.benchmark_rate_status, "N/A"))}
Usage: ${escapeHtml(safe(latestBank.calculation_usage_status, "N/A"))}
Notes: ${escapeHtml(safe(latestBank.source_notes, "N/A"))}</div>
          </details>
        </section>
      `;
    }

    function renderTechnicalAudit(rows, contextRows, bankRows) {
      return `
        <section class="card">
          <h2>Technical Audit</h2>
          <div class="note">
            Collapsed by default. Use this only when checking sources, model logic or pipeline health.
          </div>

          <details>
            <summary>Evidence and readiness rules</summary>
            <div class="details-box">Decision-ready = sale + rent + service charge from strict/high-confidence source.

Interim-screened = Property Finder DLD-derived sale/rent evidence plus user-entered DLD Service Charge Index readings.

Needs evidence = missing sale or rent evidence.

Budget monitor = evidence suggests normal market level is above AED 1.6m budget; monitor only for distressed or below-market opportunity.

Deal test = scenario only and excluded from ranking.</div>
          </details>

          <details>
            <summary>Raw latest classification rows</summary>
            <div class="details-box">${escapeHtml(JSON.stringify(rows, null, 2))}</div>
          </details>

          <details>
            <summary>Raw macro context</summary>
            <div class="details-box">${escapeHtml(JSON.stringify(contextRows[0] || {}, null, 2))}</div>
          </details>

          <details>
            <summary>Raw bank context</summary>
            <div class="details-box">${escapeHtml(JSON.stringify(bankRows[0] || {}, null, 2))}</div>
          </details>
        </section>
      `;
    }

    function renderDashboard(rows, contextRows, bankRows) {
      return `
        ${renderExecutiveDecision(rows, contextRows, bankRows)}

        <div class="layout-two">
          ${renderMacroOverlay(contextRows, rows)}
          ${renderDealTest(rows)}
        </div>

        ${renderWatchlist(rows, contextRows)}

        ${renderEvidenceCoverageMap(rows)}

        ${renderDataQuality(rows, bankRows)}

        ${renderTechnicalAudit(rows, contextRows, bankRows)}
      `;
    }

    async function loadDashboard() {
      const app = document.getElementById("app");

      try {
        const classificationRows = await restGet(
          VIEW_CLASSIFICATION,
          "select=*&order=created_at.desc"
        );

        if (!Array.isArray(classificationRows) || classificationRows.length === 0) {
          app.innerHTML = `
            <section class="card">
              <h2>No Data</h2>
              <div class="banner warn">
                No rows returned from <code>${VIEW_CLASSIFICATION}</code>.
                Run the full n8n workflow and verify the Supabase view.
              </div>
            </section>
          `;
          return;
        }

        const latestRunId = classificationRows[0].run_id;

        let contextRows = [];
        let bankRows = [];

        try {
          contextRows = await restGet(
            TABLE_AGENT_CONTEXT,
            `select=*&run_id=eq.${encodeURIComponent(latestRunId)}&order=created_at.desc&limit=1`
          );
        } catch (e) {
          contextRows = [];
        }

        try {
          bankRows = await restGet(
            TABLE_BANK_CONTEXT,
            `select=*&run_id=eq.${encodeURIComponent(latestRunId)}&order=created_at.desc&limit=1`
          );
        } catch (e) {
          bankRows = [];
        }

        if (!contextRows.length) {
          try {
            contextRows = await restGet(
              TABLE_AGENT_CONTEXT,
              "select=*&order=created_at.desc&limit=1"
            );
          } catch (e) {
            contextRows = [];
          }
        }

        if (!bankRows.length) {
          try {
            bankRows = await restGet(
              TABLE_BANK_CONTEXT,
              "select=*&order=created_at.desc&limit=1"
            );
          } catch (e) {
            bankRows = [];
          }
        }

        app.innerHTML = renderDashboard(classificationRows, contextRows, bankRows);

      } catch (error) {
        app.innerHTML = `
          <section class="card">
            <h2>Load Error</h2>
            <div class="banner bad">
              ${escapeHtml(error.message || "Unknown JavaScript or REST error.")}
            </div>
            <div class="note">
              Check that <code>${VIEW_CLASSIFICATION}</code> exists, is exposed via REST,
              and that anon/publishable-key SELECT access is allowed.
            </div>
          </section>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
